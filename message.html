<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ASCENTA 3 · Messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --bg-2:#12121a;
  --bg-3:#0f0f16;
  --ink:#e4e4e7;
  --ink-dim:#a1a1aa;
  --ink-faint:#71717a;
  --ink-faintest:#52525b;
  --line:rgba(120,120,140,0.18);
  --line-2:rgba(120,120,140,0.28);
  --accent:#60a5fa;
  --accent-soft:rgba(96,165,250,0.13);
  --accent-glow:rgba(96,165,250,0.35);
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --serif:'Times New Roman',Times,serif;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--mono)}

/* ── SETUP SCREEN ── */
#setup{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.setup-box{
  width:min(400px,90vw);
  padding:40px;
  border:1px solid var(--line-2);
  border-radius:14px;
  background:rgba(15,15,22,0.9);
  backdrop-filter:blur(20px);
  text-align:center;
}
.setup-logo{
  font-family:var(--serif);
  font-size:32px;
  color:#fafafa;
  letter-spacing:-1px;
  margin-bottom:6px;
}
.setup-sub{
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--ink-faint);
  margin-bottom:32px;
}
.setup-label{
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--ink-faintest);
  text-align:left;
  margin-bottom:8px;
}
.setup-input{
  width:100%;
  padding:13px 16px;
  background:rgba(10,10,15,0.7);
  border:1px solid var(--line-2);
  border-radius:8px;
  color:var(--ink);
  font-family:var(--mono);
  font-size:14px;
  outline:none;
  transition:.2s;
}
.setup-input:focus{
  border-color:rgba(96,165,250,0.5);
  box-shadow:0 0 0 3px rgba(96,165,250,0.1);
}
.setup-btn{
  width:100%;
  margin-top:14px;
  padding:13px;
  background:rgba(96,165,250,0.1);
  color:var(--accent);
  border:1px solid rgba(96,165,250,0.3);
  border-radius:8px;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:.2s;
}
.setup-btn:hover{background:rgba(96,165,250,0.18);border-color:rgba(96,165,250,0.55);color:#93c5fd}
.setup-err{
  margin-top:12px;
  font-size:11px;
  color:#f87171;
  min-height:16px;
}

/* ── MAIN LAYOUT ── */
#app{
  display:none;
  height:100%;
  flex-direction:column;
}
#app.live{display:flex}

.top-bar{
  height:44px;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 16px;
  border-bottom:1px solid var(--line);
  background:rgba(8,8,12,0.9);
  backdrop-filter:blur(16px);
}
.top-brand{
  font-family:var(--serif);
  font-size:18px;
  color:#fafafa;
  letter-spacing:-.5px;
}
.top-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px var(--accent-glow);
}
.top-label{
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--ink-faint);
  border-left:1px solid var(--line-2);
  padding-left:12px;
}
.top-grow{flex:1}
.top-user{
  font-size:11px;
  color:var(--ink-faint);
  letter-spacing:.5px;
}
.top-user span{color:var(--accent)}

.main{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;
  flex:0 0 240px;
  border-right:1px solid var(--line);
  background:var(--bg-3);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.sidebar-head{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--line);
}
.sidebar-title{
  font-size:10px;
  letter-spacing:1.8px;
  text-transform:uppercase;
  color:var(--ink-faintest);
  margin-bottom:10px;
}
.sidebar-search{
  width:100%;
  padding:8px 12px;
  background:rgba(10,10,15,0.6);
  border:1px solid var(--line);
  border-radius:6px;
  color:var(--ink);
  font-family:var(--mono);
  font-size:12px;
  outline:none;
  transition:.2s;
}
.sidebar-search:focus{border-color:rgba(96,165,250,0.4)}
.sidebar-search::placeholder{color:var(--ink-faintest)}
.user-list{
  flex:1;
  overflow-y:auto;
  padding:8px 0;
}
.user-list::-webkit-scrollbar{width:3px}
.user-list::-webkit-scrollbar-track{background:transparent}
.user-list::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:2px}

.user-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 16px;
  cursor:pointer;
  transition:.15s;
  border-left:2px solid transparent;
}
.user-item:hover{background:rgba(96,165,250,0.06)}
.user-item.active{
  background:rgba(96,165,250,0.1);
  border-left-color:var(--accent);
}
.user-avatar{
  width:32px;height:32px;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
  font-weight:600;
  flex:0 0 32px;
  background:rgba(96,165,250,0.15);
  color:var(--accent);
  border:1px solid rgba(96,165,250,0.2);
}
.user-info{flex:1;min-width:0}
.user-name{
  font-size:12px;
  color:var(--ink);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.user-preview{
  font-size:10px;
  color:var(--ink-faintest);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-top:2px;
}
.user-time{
  font-size:10px;
  color:var(--ink-faintest);
  flex:0 0 auto;
}
.user-unread{
  width:16px;height:16px;
  border-radius:50%;
  background:var(--accent);
  font-size:9px;
  display:flex;align-items:center;justify-content:center;
  color:#000;
  font-weight:700;
  flex:0 0 auto;
}

.sidebar-empty{
  padding:24px 16px;
  font-size:11px;
  color:var(--ink-faintest);
  text-align:center;
  line-height:1.6;
}

/* ── CHAT PANEL ── */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}
.chat-empty{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:var(--ink-faintest);
  font-size:12px;
  letter-spacing:.5px;
}
.chat-empty .big{
  font-family:var(--serif);
  font-size:36px;
  color:var(--ink-faint);
  opacity:.3;
}
.chat-header{
  height:48px;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 20px;
  border-bottom:1px solid var(--line);
  background:rgba(12,12,18,0.7);
}
.chat-header-avatar{
  width:28px;height:28px;
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
  background:rgba(96,165,250,0.15);
  color:var(--accent);
  border:1px solid rgba(96,165,250,0.2);
}
.chat-header-name{
  font-size:13px;
  color:#fafafa;
  flex:1;
}
.chat-header-id{
  font-size:10px;
  color:var(--ink-faintest);
  letter-spacing:.5px;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:2px}

.msg-group{margin-bottom:12px}
.msg-group-label{
  text-align:center;
  font-size:10px;
  color:var(--ink-faintest);
  letter-spacing:1px;
  margin:16px 0 10px;
  text-transform:uppercase;
}
.msg-row{
  display:flex;
  align-items:flex-end;
  gap:8px;
  margin-bottom:3px;
}
.msg-row.mine{flex-direction:row-reverse}
.msg-av{
  width:24px;height:24px;
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;
  flex:0 0 24px;
  background:rgba(96,165,250,0.15);
  color:var(--accent);
  border:1px solid rgba(96,165,250,0.15);
  margin-bottom:2px;
}
.msg-av.hidden{visibility:hidden}
.bubble{
  max-width:68%;
  padding:9px 13px;
  border-radius:12px;
  font-size:13px;
  line-height:1.55;
  word-break:break-word;
  position:relative;
}
.msg-row:not(.mine) .bubble{
  background:rgba(25,25,35,0.9);
  border:1px solid var(--line);
  color:var(--ink);
  border-bottom-left-radius:4px;
}
.msg-row.mine .bubble{
  background:rgba(96,165,250,0.18);
  border:1px solid rgba(96,165,250,0.3);
  color:#e0eeff;
  border-bottom-right-radius:4px;
}
.msg-time{
  font-size:9px;
  color:var(--ink-faintest);
  margin-top:4px;
  letter-spacing:.5px;
}
.msg-row.mine .msg-time{text-align:right}

.chat-input-row{
  flex:0 0 auto;
  padding:14px 16px;
  border-top:1px solid var(--line);
  background:rgba(10,10,15,0.8);
  display:flex;
  gap:10px;
  align-items:flex-end;
}
.chat-input{
  flex:1;
  padding:11px 14px;
  background:rgba(15,15,22,0.8);
  border:1px solid var(--line-2);
  border-radius:10px;
  color:var(--ink);
  font-family:var(--mono);
  font-size:13px;
  outline:none;
  resize:none;
  min-height:42px;
  max-height:120px;
  line-height:1.5;
  transition:.2s;
}
.chat-input:focus{border-color:rgba(96,165,250,0.45);box-shadow:0 0 0 3px rgba(96,165,250,0.08)}
.chat-input::placeholder{color:var(--ink-faintest)}
.send-btn{
  width:42px;height:42px;
  border-radius:10px;
  border:1px solid rgba(96,165,250,0.3);
  background:rgba(96,165,250,0.1);
  color:var(--accent);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;
  flex:0 0 42px;
}
.send-btn:hover{background:rgba(96,165,250,0.22);border-color:rgba(96,165,250,0.55)}
.send-btn:active{transform:scale(.95)}
.send-btn svg{width:16px;height:16px}

/* scrollbar global */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}

/* loading spinner */
.spinner{
  width:20px;height:20px;
  border:2px solid var(--line);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="setup">
  <div class="setup-box">
    <div class="setup-logo">ASCENTA 3</div>
    <div class="setup-sub">Messages · Choose your handle</div>
    <div class="setup-label">Display name</div>
    <input class="setup-input" id="nameInput" type="text" maxlength="24" placeholder="e.g. kai_07" autocomplete="off">
    <button class="setup-btn" id="joinBtn">Enter Messages</button>
    <div class="setup-err" id="setupErr"></div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <div class="top-bar">
    <span class="top-dot"></span>
    <span class="top-brand">ASCENTA 3</span>
    <span class="top-label">Messages</span>
    <span class="top-grow"></span>
    <span class="top-user">Logged in as <span id="myNameDisplay">—</span></span>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">Users online</div>
        <input class="sidebar-search" id="userSearch" type="text" placeholder="Search users…">
      </div>
      <div class="user-list" id="userList">
        <div class="sidebar-empty">
          <div class="spinner"></div>
          <div style="margin-top:12px">Loading users…</div>
        </div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat" id="chatPanel">
      <div class="chat-empty" id="chatEmpty">
        <div class="big">✉</div>
        <div>Select a user to start a conversation</div>
      </div>

      <div id="chatActive" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="chat-header">
          <div class="chat-header-avatar" id="chatAvatar">?</div>
          <div class="chat-header-name" id="chatName">—</div>
          <div class="chat-header-id" id="chatId">—</div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="Send a message…"></textarea>
          <button class="send-btn" id="sendBtn" title="Send (Enter)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ── Firebase init ──
const firebaseConfig = {
  apiKey: "AIzaSyCt0ItW1VbdnwfHJpTRUxUk5RAhBkgDsJ8",
  authDomain: "asenchata.firebaseapp.com",
  projectId: "asenchata",
  storageBucket: "asenchata.firebasestorage.app",
  messagingSenderId: "1059766104296",
  appId: "1:1059766104296:web:aa69cca63fc1f901af995d",
  measurementId: "G-LBSXY2TJT3"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── State ──
let myUid  = null;
let myName = null;
let activeUid   = null;
let activeName  = null;
let unsubMessages = null;
let unsubUsers    = null;
let allUsers = [];

// ── DOM refs ──
const setupEl    = document.getElementById('setup');
const appEl      = document.getElementById('app');
const nameInput  = document.getElementById('nameInput');
const joinBtn    = document.getElementById('joinBtn');
const setupErr   = document.getElementById('setupErr');
const myNameDisp = document.getElementById('myNameDisplay');
const userList   = document.getElementById('userList');
const userSearch = document.getElementById('userSearch');
const chatEmpty  = document.getElementById('chatEmpty');
const chatActive = document.getElementById('chatActive');
const chatAvatar = document.getElementById('chatAvatar');
const chatNameEl = document.getElementById('chatName');
const chatIdEl   = document.getElementById('chatId');
const messagesEl = document.getElementById('messages');
const chatInput  = document.getElementById('chatInput');
const sendBtn    = document.getElementById('sendBtn');

// ── Setup / Join ──
joinBtn.addEventListener('click', doJoin);
nameInput.addEventListener('keydown', e => { if(e.key==='Enter') doJoin(); });

async function doJoin(){
  const name = nameInput.value.trim();
  if(!name){ setupErr.textContent='Please enter a display name.'; return; }
  if(name.length < 2){ setupErr.textContent='Name must be at least 2 characters.'; return; }
  if(!/^[a-zA-Z0-9_.\- ]+$/.test(name)){ setupErr.textContent='Letters, numbers, _ . - only.'; return; }
  setupErr.textContent='';
  joinBtn.disabled=true;
  joinBtn.textContent='Connecting…';
  try {
    const cred = await auth.signInAnonymously();
    myUid  = cred.user.uid;
    myName = name;
    // check if name is taken (by another uid)
    const snap = await db.collection('users').where('name','==',name).get();
    const taken = snap.docs.some(d => d.id !== myUid);
    if(taken){ setupErr.textContent='That name is taken. Try another.'; joinBtn.disabled=false; joinBtn.textContent='Enter Messages'; return; }
    // register / update user doc
    await db.collection('users').doc(myUid).set({ name, uid:myUid, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge:true });
    myNameDisp.textContent = name;
    setupEl.style.display  = 'none';
    appEl.classList.add('live');
    startApp();
  } catch(e){
    console.error(e);
    setupErr.textContent = 'Error connecting. Check your internet.';
    joinBtn.disabled = false;
    joinBtn.textContent = 'Enter Messages';
  }
}

// ── Heartbeat (keep lastSeen fresh) ──
function startApp(){
  updateLastSeen();
  setInterval(updateLastSeen, 30000);
  listenUsers();
}
function updateLastSeen(){
  if(!myUid) return;
  db.collection('users').doc(myUid).update({ lastSeen: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
}

// ── User list ──
function listenUsers(){
  if(unsubUsers) unsubUsers();
  unsubUsers = db.collection('users').onSnapshot(snap => {
    allUsers = [];
    snap.forEach(doc => {
      const d = doc.data();
      if(d.uid !== myUid) allUsers.push(d);
    });
    allUsers.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    renderUsers();
  });
}

userSearch.addEventListener('input', renderUsers);

function renderUsers(){
  const q = userSearch.value.trim().toLowerCase();
  const filtered = q ? allUsers.filter(u=>(u.name||'').toLowerCase().includes(q)) : allUsers;
  if(!filtered.length){
    userList.innerHTML = `<div class="sidebar-empty">${q ? 'No users found.' : 'No other users yet.<br>Share the link!'}</div>`;
    return;
  }
  userList.innerHTML = '';
  filtered.forEach(u => {
    const el = document.createElement('div');
    el.className = 'user-item' + (u.uid===activeUid?' active':'');
    el.dataset.uid  = u.uid;
    el.dataset.name = u.name;
    const initial = (u.name||'?')[0].toUpperCase();
    // time ago
    let timeStr = '';
    if(u.lastSeen && u.lastSeen.toDate){
      const diff = Date.now() - u.lastSeen.toDate().getTime();
      const mins = Math.floor(diff/60000);
      timeStr = mins < 2 ? 'now' : mins < 60 ? `${mins}m` : `${Math.floor(mins/60)}h`;
    }
    el.innerHTML = `
      <div class="user-avatar">${initial}</div>
      <div class="user-info">
        <div class="user-name">${escHtml(u.name)}</div>
        <div class="user-preview">Click to message</div>
      </div>
      ${timeStr ? `<div class="user-time">${timeStr}</div>` : ''}
    `;
    el.addEventListener('click', ()=>openChat(u.uid, u.name));
    userList.appendChild(el);
  });
}

// ── Open chat ──
function openChat(uid, name){
  activeUid  = uid;
  activeName = name;
  // update sidebar highlight
  [...userList.querySelectorAll('.user-item')].forEach(el=>{
    el.classList.toggle('active', el.dataset.uid===uid);
  });
  chatAvatar.textContent = name[0].toUpperCase();
  chatNameEl.textContent = name;
  chatIdEl.textContent   = uid.slice(0,8)+'…';
  chatEmpty.style.display  = 'none';
  chatActive.style.display = 'flex';
  messagesEl.innerHTML = '<div class="sidebar-empty"><div class="spinner"></div></div>';
  chatInput.focus();
  listenMessages(uid);
}

function convId(uid1, uid2){
  return [uid1,uid2].sort().join('__');
}

function listenMessages(peerUid){
  if(unsubMessages) unsubMessages();
  const cid = convId(myUid, peerUid);
  unsubMessages = db.collection('conversations').doc(cid)
    .collection('messages').orderBy('timestamp','asc')
    .onSnapshot(snap => {
      renderMessages(snap.docs.map(d=>d.data()));
    });
}

function renderMessages(msgs){
  if(!msgs.length){
    messagesEl.innerHTML = `<div class="sidebar-empty" style="margin-top:40px">No messages yet.<br>Say hello!</div>`;
    return;
  }
  messagesEl.innerHTML = '';
  let lastDate = '';
  msgs.forEach((m, i) => {
    const ts    = m.timestamp ? m.timestamp.toDate() : new Date();
    const dateStr = ts.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    if(dateStr !== lastDate){
      lastDate = dateStr;
      const lbl = document.createElement('div');
      lbl.className = 'msg-group-label';
      lbl.textContent = dateStr;
      messagesEl.appendChild(lbl);
    }
    const mine  = m.from === myUid;
    const next  = msgs[i+1];
    const showAv= !mine && (!next || next.from !== m.from);
    const row   = document.createElement('div');
    row.className = 'msg-row' + (mine?' mine':'');
    const timeStr = ts.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
    const initial = mine ? (myName||'?')[0].toUpperCase() : (activeName||'?')[0].toUpperCase();
    row.innerHTML = `
      <div class="msg-av ${showAv?'':'hidden'}">${initial}</div>
      <div>
        <div class="bubble">${escHtml(m.text)}</div>
        <div class="msg-time">${timeStr}</div>
      </div>
    `;
    messagesEl.appendChild(row);
  });
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── Send ──
sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', e => {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
chatInput.addEventListener('input', ()=>{
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120)+'px';
});

async function sendMessage(){
  const text = chatInput.value.trim();
  if(!text || !activeUid) return;
  chatInput.value = '';
  chatInput.style.height = '';
  const cid = convId(myUid, activeUid);
  try {
    await db.collection('conversations').doc(cid)
      .collection('messages').add({
        from:      myUid,
        fromName:  myName,
        to:        activeUid,
        text:      text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
  } catch(e){
    console.error('Send error',e);
  }
}

// ── Helpers ──
function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
