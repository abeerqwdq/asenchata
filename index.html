<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AscentChat · ASCE 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#0f0f16;--sf:#12121a;
  --ink:#e4e4e7;--ink2:#a1a1aa;--ink3:#71717a;--ink4:#52525b;
  --line:rgba(120,120,140,0.18);--line2:rgba(120,120,140,0.28);
  --A:#60a5fa;--A2:#93c5fd;--As:rgba(96,165,250,0.13);--Ag:rgba(96,165,250,0.35);
  --G:#34d399;--R:#f87171;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  --serif:'Times New Roman',Times,serif;
  --ease:.2s cubic-bezier(.4,0,.2,1);
  --sw:272px;
  --tbh:52px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased}

/* ── TOASTS ── */
#toasts{position:fixed;top:16px;right:16px;z-index:9000;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:300px}
.toast{background:var(--sf);border:1px solid var(--line2);border-radius:16px;padding:12px 14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:flex;align-items:center;gap:10px;pointer-events:all;cursor:pointer;animation:tIN .3s cubic-bezier(.34,1.56,.64,1) forwards}
.toast.bye{animation:tOUT .2s ease-in forwards}
@keyframes tIN{from{opacity:0;transform:translateX(50px) scale(.9)}to{opacity:1;transform:none}}
@keyframes tOUT{to{opacity:0;transform:translateX(50px) scale(.9)}}
.t-av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex:0 0 34px;background:var(--As);color:var(--A)}
.t-body .t-who{font-size:12px;font-weight:600;color:var(--ink)}
.t-body .t-msg{font-size:11px;color:var(--ink3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}

/* ── SETUP ── */
#setup{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px}
.setup-box{width:min(420px,100%);display:flex;flex-direction:column;align-items:center}
.s-logo{font-family:var(--serif);font-size:48px;font-weight:600;color:var(--ink);letter-spacing:-2.5px;line-height:1;margin-bottom:4px}
.s-logo em{color:var(--A);font-style:normal}
.s-sub{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:32px}
.s-card{width:100%;background:var(--sf);border:1px solid var(--line2);border-radius:22px;padding:28px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.s-lbl{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.s-in{width:100%;padding:13px 15px;background:var(--bg);border:1.5px solid var(--line2);border-radius:10px;color:var(--ink);font-family:var(--mono);font-size:15px;outline:none;transition:var(--ease);margin-bottom:14px;-webkit-appearance:none}
.s-in:focus{border-color:var(--A);box-shadow:0 0 0 3px var(--As)}
.s-in::placeholder{color:var(--ink4)}
.s-rem{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink3);margin-bottom:16px;cursor:pointer;user-select:none}
.s-rem input{accent-color:var(--A);width:16px;height:16px;cursor:pointer}
.s-btn{width:100%;padding:14px;background:var(--As);color:var(--A);border:1.5px solid rgba(96,165,250,0.3);border-radius:10px;font-family:var(--mono);font-size:13px;letter-spacing:1px;font-weight:600;cursor:pointer;transition:var(--ease);touch-action:manipulation}
.s-btn:hover{background:rgba(96,165,250,0.22);border-color:rgba(96,165,250,0.55);color:var(--A2);box-shadow:0 4px 18px var(--Ag)}
.s-btn:active{transform:scale(.97)}
.s-back{display:block;margin-bottom:16px;font-size:11px;color:var(--ink3);text-decoration:none;letter-spacing:.5px;transition:var(--ease)}
.s-back:hover{color:var(--A)}
.s-err{margin-top:12px;font-size:12px;min-height:18px;color:var(--R)}

/* ── APP ── */
#app{display:none;height:100%;flex-direction:column}
#app.live{display:flex}

/* ── TOPBAR ── */
.topbar{height:var(--tbh);flex:0 0 var(--tbh);display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(8,8,12,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);z-index:100}
.tb-hamburger{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--line);background:transparent;color:var(--ink3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:var(--ease);flex:0 0 36px;touch-action:manipulation}
.tb-hamburger:hover{background:var(--bg2);color:var(--ink)}
.tb-hamburger span{display:block;width:14px;height:1.5px;background:currentColor;border-radius:2px;transition:var(--ease)}
.tb-brand{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--ink);letter-spacing:-1px}
.tb-brand em{color:var(--A);font-style:normal}
.tb-home{font-size:11px;color:var(--ink3);letter-spacing:.5px;text-decoration:none;padding:6px 10px;border:1px solid var(--line);border-radius:8px;transition:var(--ease)}
.tb-home:hover{color:var(--A);border-color:rgba(96,165,250,0.3)}
.tb-grow{flex:1}
.tb-chip{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:100px;background:var(--As);font-size:11px;color:var(--A);font-weight:600}
.tb-av{width:22px;height:22px;border-radius:5px;background:var(--A);color:#000;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.tb-notify{position:relative}
.tb-nbadge{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--R);color:#fff;font-size:8px;font-weight:800;display:none;align-items:center;justify-content:center;border:2px solid var(--sf)}
.tb-nbadge.show{display:flex}

/* ── LAYOUT ── */
.main{flex:1;display:flex;overflow:hidden;position:relative}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sw);flex:0 0 var(--sw);
  background:var(--bg3);border-right:1px solid var(--line);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width var(--ease),flex-basis var(--ease);
  z-index:50;position:relative;
}
.sidebar.closed{width:0;flex-basis:0;overflow:hidden}

@media(max-width:768px){
  .sidebar{
    position:absolute;top:0;left:0;bottom:0;
    width:var(--sw) !important;flex:none !important;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    transform:translateX(0);
    transition:transform var(--ease);
  }
  .sidebar.closed{transform:translateX(calc(-1 * var(--sw)));width:var(--sw) !important;flex:none !important}
  .sb-veil{display:block !important}
}
@media(min-width:600px) and (max-width:768px){:root{--sw:240px}}
@media(max-width:599px){:root{--sw:88vw}}

.sb-veil{display:none;position:absolute;inset:0;z-index:49;background:rgba(0,0,0,0.5);backdrop-filter:blur(2px);touch-action:none}

.sb-head{padding:12px 12px 10px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px;flex:0 0 auto}
.sb-search{width:100%;padding:10px 12px;background:var(--bg);border:1.5px solid var(--line);border-radius:10px;color:var(--ink);font-family:var(--mono);font-size:13px;outline:none;transition:var(--ease);-webkit-appearance:none}
.sb-search:focus{border-color:var(--A);background:var(--sf)}
.sb-search::placeholder{color:var(--ink4)}
.sb-tabs{display:flex;gap:3px;background:var(--bg2);border-radius:9px;padding:3px}
.sb-tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;letter-spacing:.5px;text-transform:uppercase;font-weight:500;color:var(--ink3);border-radius:7px;cursor:pointer;transition:var(--ease);touch-action:manipulation;user-select:none}
.sb-tab.on{background:var(--sf);color:var(--A);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.ng-btn{width:100%;padding:9px;background:var(--As);border:1.5px dashed rgba(96,165,250,0.3);border-radius:9px;color:var(--A);font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;transition:var(--ease);touch-action:manipulation;display:none}
.ng-btn.show{display:block}
.ng-btn:hover{background:rgba(96,165,250,0.22)}
.ng-btn:active{transform:scale(.97)}

.conv-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 8px;display:flex;flex-direction:column;gap:1px;-webkit-overflow-scrolling:touch}
.conv-list::-webkit-scrollbar{width:3px}
.conv-list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

.ci{display:flex;align-items:center;gap:9px;padding:11px 10px;border-radius:11px;cursor:pointer;transition:var(--ease);touch-action:manipulation;-webkit-user-select:none;user-select:none}
.ci:hover,.ci:active{background:var(--bg2)}
.ci.on{background:var(--As)}
.ci-av{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex:0 0 40px;background:var(--bg2);color:var(--ink3);border:1.5px solid var(--line);transition:var(--ease);position:relative}
.ci.on .ci-av{background:var(--A);color:#000;border-color:transparent}
.ci-dot{position:absolute;bottom:-2px;right:-2px;width:11px;height:11px;border-radius:50%;background:var(--G);border:2.5px solid var(--bg3)}
.ci.on .ci-dot{border-color:var(--As)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-preview{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ci-preview.unread{color:var(--ink2);font-weight:600}
.ci.has-unread{background:rgba(96,165,250,0.07)}
.ci.has-unread:hover,.ci.has-unread:active{background:rgba(96,165,250,0.13)}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:0 0 auto}
.ci-udot{width:8px;height:8px;border-radius:50%;background:var(--A);box-shadow:0 0 6px rgba(96,165,250,0.7)}
.ci-time{font-size:10px;color:var(--ink4)}
.ci-badge{min-width:18px;height:18px;border-radius:9px;background:var(--A);color:#000;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px}
.c-empty{padding:28px 12px;text-align:center;font-size:12px;color:var(--ink4);line-height:1.9}

/* ── CHAT PANEL ── */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}
.chat-ph{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px}
.chat-ph-ico{font-size:48px;opacity:.18;animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.chat-ph-txt{font-size:12px;color:var(--ink4);letter-spacing:.5px;text-align:center}

.chat-hdr{height:54px;flex:0 0 54px;display:flex;align-items:center;gap:11px;padding:0 16px;background:rgba(12,12,18,0.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.ch-av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;background:var(--As);color:var(--A);border:1.5px solid rgba(96,165,250,0.2);flex:0 0 34px}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-sub{font-size:10px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-back{display:none;width:36px;height:36px;border-radius:9px;border:1.5px solid var(--line);background:transparent;color:var(--ink3);cursor:pointer;align-items:center;justify-content:center;font-size:18px;flex:0 0 36px;touch-action:manipulation}
@media(max-width:768px){.ch-back{display:flex}}

/* ── MESSAGES ── */
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px;display:flex;flex-direction:column;gap:1px;-webkit-overflow-scrolling:touch}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
@media(max-width:500px){.msgs{padding:12px 10px}}

.day-lbl{text-align:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink4);margin:14px 0 8px;display:flex;align-items:center;gap:10px}
.day-lbl::before,.day-lbl::after{content:'';flex:1;height:1px;background:var(--line)}

.mrow{display:flex;align-items:flex-end;gap:7px;margin-bottom:2px}
.mrow.me{flex-direction:row-reverse}
.mrow.sys{justify-content:center;margin:8px 0}
.sys-pill{font-size:11px;color:var(--ink3);background:var(--bg2);padding:5px 14px;border-radius:100px;border:1px solid var(--line)}
.m-av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:0 0 28px;background:var(--bg2);color:var(--ink3);border:1px solid var(--line)}
.m-av.hide{visibility:hidden}
.m-body{display:flex;flex-direction:column;max-width:min(72%,480px)}
@media(max-width:500px){.m-body{max-width:85%}}
.mrow.me .m-body{align-items:flex-end}
.m-sender{font-size:10px;color:var(--ink3);margin-bottom:3px;padding-left:2px}
.bw{position:relative}
.react-bar{
  display:none;position:absolute;z-index:60;
  bottom:calc(100% + 6px);
  background:var(--sf);border:1px solid var(--line2);
  border-radius:14px;padding:8px 10px;gap:4px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);white-space:nowrap;
}
.mrow:not(.me) .react-bar{left:0}
.mrow.me .react-bar{right:0}
.bw:hover .react-bar{display:flex}
.bw.rbar-open .react-bar{display:flex}
.rc{font-size:18px;cursor:pointer;padding:3px;border-radius:7px;transition:var(--ease);touch-action:manipulation}
.rc:hover,.rc:active{background:var(--bg2);transform:scale(1.2)}
.bubble{padding:10px 14px;border-radius:17px;font-size:14px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.mrow:not(.me) .bubble{background:rgba(25,25,35,0.9);border:1px solid var(--line);color:var(--ink);border-bottom-left-radius:4px}
.mrow.me .bubble{background:rgba(96,165,250,0.18);border:1px solid rgba(96,165,250,0.3);color:#e0eeff;border-bottom-right-radius:4px;box-shadow:0 2px 10px var(--Ag)}
.rxns{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.rxn{font-size:13px;padding:3px 8px;background:var(--bg2);border:1px solid var(--line);border-radius:100px;cursor:pointer;transition:var(--ease);display:flex;align-items:center;gap:3px;touch-action:manipulation}
.rxn:hover{background:var(--bg);border-color:var(--A)}
.rxn span{font-size:10px;color:var(--ink3)}
.m-time{font-size:10px;color:var(--ink4);margin-top:4px;padding:0 2px}

/* Scroll FAB */
.sfab{position:absolute;bottom:86px;right:14px;width:36px;height:36px;border-radius:50%;background:var(--A);color:#000;border:none;box-shadow:0 4px 16px var(--Ag);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:16px;z-index:10;transition:var(--ease);touch-action:manipulation}
.sfab.show{display:flex}
.sfab:hover{background:var(--A2)}

/* ── INPUT AREA ── */
.inp-wrap{flex:0 0 auto;padding:10px 12px;border-top:1px solid var(--line);background:rgba(10,10,15,0.85);backdrop-filter:blur(12px);position:relative}
.ep-pop{position:absolute;bottom:calc(100% + 6px);left:12px;background:var(--sf);border:1px solid var(--line2);border-radius:14px;padding:10px;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;z-index:200;width:min(296px,90vw)}
.ep-pop.open{display:block}
.ep-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:160px;overflow-y:auto}
.ep{font-size:20px;cursor:pointer;padding:5px;border-radius:7px;text-align:center;transition:var(--ease);touch-action:manipulation;line-height:1}
.ep:hover,.ep:active{background:var(--bg2);transform:scale(1.1)}
.inp-row{display:flex;align-items:flex-end;gap:8px}
.em-btn{width:38px;height:38px;border-radius:10px;flex:0 0 38px;border:1.5px solid var(--line);background:transparent;color:var(--ink3);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--ease);touch-action:manipulation}
.em-btn:hover{background:var(--bg2);border-color:var(--line2)}
.chat-in{flex:1;padding:11px 14px;background:var(--bg2);border:1.5px solid var(--line);border-radius:10px;color:var(--ink);font-family:var(--mono);font-size:14px;outline:none;resize:none;min-height:42px;max-height:120px;line-height:1.55;transition:var(--ease);-webkit-appearance:none}
.chat-in:focus{border-color:var(--A);background:var(--sf);box-shadow:0 0 0 3px var(--As)}
.chat-in::placeholder{color:var(--ink4)}
.snd-btn{width:42px;height:42px;border-radius:10px;flex:0 0 42px;border:1.5px solid rgba(96,165,250,0.3);background:var(--As);color:var(--A);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px var(--Ag);transition:var(--ease);touch-action:manipulation}
.snd-btn:hover{background:rgba(96,165,250,0.22);border-color:rgba(96,165,250,0.55);color:var(--A2)}
.snd-btn:active{transform:scale(.9)}
.snd-btn svg{width:16px;height:16px}

/* ── GROUP MODAL ── */
.overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--sf);border:1px solid var(--line2);border-radius:22px;padding:26px;width:min(420px,100%);box-shadow:0 16px 60px rgba(0,0,0,0.6);max-height:90vh;overflow-y:auto}
.m-title{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--ink);margin-bottom:4px}
.m-sub{font-size:12px;color:var(--ink3);margin-bottom:20px}
.m-lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.m-in{width:100%;padding:12px 14px;background:var(--bg);border:1.5px solid var(--line);border-radius:10px;color:var(--ink);font-family:var(--mono);font-size:14px;outline:none;margin-bottom:14px;transition:var(--ease);-webkit-appearance:none}
.m-in:focus{border-color:var(--A);box-shadow:0 0 0 3px var(--As)}
.m-list{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
.m-ck{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:var(--ease);touch-action:manipulation}
.m-ck:hover{background:var(--bg2)}
.m-ck input{accent-color:var(--A);width:17px;height:17px;cursor:pointer}
.m-ck-name{font-size:13px;color:var(--ink)}
.m-acts{display:flex;gap:8px;justify-content:flex-end}
.mbtn{padding:11px 20px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;transition:var(--ease);touch-action:manipulation}
.mbtn.cn{background:transparent;border:1.5px solid var(--line);color:var(--ink3)}
.mbtn.cn:hover{background:var(--bg2)}
.mbtn.ok{background:var(--As);border:1.5px solid rgba(96,165,250,0.3);color:var(--A)}
.mbtn.ok:hover{background:rgba(96,165,250,0.22);color:var(--A2)}
.m-err{font-size:11px;color:var(--R);min-height:16px;margin-bottom:10px}

.spin{display:inline-block;width:20px;height:20px;border:2.5px solid var(--line);border-top-color:var(--A);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── RENAME POPOVER ── */
.tb-chip{cursor:pointer;transition:var(--ease)}
.tb-chip:hover{background:rgba(96,165,250,0.2);box-shadow:0 0 0 1.5px rgba(96,165,250,0.35)}
#renamePop{position:fixed;top:60px;right:14px;background:var(--sf);border:1px solid var(--line2);border-radius:14px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;z-index:300;width:220px}
#renamePop.open{display:block}
#renamePop .rp-lbl{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin-bottom:7px}
#renameInput{width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--line2);border-radius:8px;color:var(--ink);font-family:var(--mono);font-size:13px;outline:none;margin-bottom:10px;transition:var(--ease);-webkit-appearance:none}
#renameInput:focus{border-color:var(--A);box-shadow:0 0 0 3px var(--As)}
#renamePop .rp-row{display:flex;gap:6px}
#renamePop .rp-btn{flex:1;padding:8px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;transition:var(--ease);touch-action:manipulation}
.rp-save{background:var(--As);border:1.5px solid rgba(96,165,250,0.3);color:var(--A)}
.rp-save:hover{background:rgba(96,165,250,0.22);color:var(--A2)}
.rp-cancel{background:transparent;border:1.5px solid var(--line);color:var(--ink3)}
.rp-cancel:hover{background:var(--bg2)}
.rp-err{font-size:10px;color:var(--R);min-height:14px;margin-bottom:6px}
</style>
</head>
<body>

<div id="toasts"></div>

<!-- ── SETUP ── -->
<div id="setup">
  <div class="setup-box">
    <div class="s-logo">Ascen<em>Chat</em></div>
    <div class="s-sub">Schoolwide · Free · No code needed</div>
    <div class="s-card">
      <div class="s-lbl">Your display name</div>
      <input class="s-in" id="nameIn" type="text" maxlength="24" placeholder="e.g. luna_84" autocomplete="off" autocorrect="off" autocapitalize="off">
      <label class="s-rem"><input type="checkbox" id="remMe" checked> Remember me on this device</label>
      <button class="s-btn" id="joinBtn">Enter AscentChat</button>
      <div class="s-err" id="sErr"></div>
    </div>
    <a class="s-back" href="/">← Back to ASCENTA 3</a>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="topbar">
    <button class="tb-hamburger" id="sbBtn" aria-label="Toggle sidebar">
      <span></span><span></span><span></span>
    </button>
    <span class="tb-brand">Ascen<em>Chat</em></span>
    <span class="tb-grow"></span>
    <div class="tb-chip tb-notify" onclick="openRename()" title="Click to change name">
      <div class="tb-av" id="myAv">?</div>
      <span id="myNameDisp">—</span>
      <div class="tb-nbadge" id="globalBadge"></div>
    </div>
  </div>
  <div id="renamePop">
    <div class="rp-lbl">Change display name</div>
    <input id="renameInput" type="text" maxlength="24" placeholder="New name…" autocomplete="off" autocorrect="off" autocapitalize="off">
    <div class="rp-err" id="rpErr"></div>
    <div class="rp-row">
      <button class="rp-btn rp-cancel" onclick="closeRename()">Cancel</button>
      <button class="rp-btn rp-save" onclick="confirmRename()">Save</button>
    </div>
  </div>

  <div class="main">
    <div class="sb-veil" id="sbVeil" onclick="closeSb()"></div>
    <div class="sidebar closed" id="sidebar">
      <div class="sb-head">
        <input class="sb-search" id="sbSearch" type="text" placeholder="🔍  Search…" autocorrect="off">
        <div class="sb-tabs">
          <div class="sb-tab on" id="tDM" onclick="setTab('dm')">💬 DMs</div>
          <div class="sb-tab" id="tGrp" onclick="setTab('grp')">👥 Groups</div>
        </div>
        <button class="ng-btn" id="ngBtn" onclick="openGM(event)">＋ New group chat</button>
      </div>
      <div class="conv-list" id="convList">
        <div class="c-empty"><div class="spin"></div><div style="margin-top:12px">Loading…</div></div>
      </div>
    </div>

    <div class="chat" id="chatPanel">
      <div class="chat-ph" id="chatPh">
        <div class="chat-ph-ico">💬</div>
        <div class="chat-ph-txt">Pick a conversation<br>from the sidebar</div>
      </div>
      <div id="chatBody" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="chat-hdr">
          <button class="ch-back" id="chBack" onclick="goBack()" aria-label="Back">‹</button>
          <div class="ch-av" id="chAv">?</div>
          <div class="ch-info">
            <div class="ch-name" id="chName">—</div>
            <div class="ch-sub" id="chSub">—</div>
          </div>
        </div>
        <div class="msgs" id="msgs" onscroll="onMsgsScroll()"></div>
        <button class="sfab" id="sfab" onclick="scrollBot()" aria-label="Scroll to bottom">↓</button>
        <div class="inp-wrap">
          <div class="ep-pop" id="epPop"></div>
          <div class="inp-row">
            <button class="em-btn" id="emBtn" onclick="toggleEp()" aria-label="Emoji">😊</button>
            <textarea class="chat-in" id="chatIn" rows="1" placeholder="Message…"></textarea>
            <button class="snd-btn" id="sndBtn" aria-label="Send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── GROUP MODAL ── -->
<div class="overlay" id="grpOv">
  <div class="modal">
    <div class="m-title">New group chat</div>
    <div class="m-sub">Name it and pick who's in</div>
    <div class="m-lbl">Group name</div>
    <input class="m-in" id="grpName" type="text" maxlength="36" placeholder="e.g. Weekend Plans 🎉" autocorrect="off">
    <div class="m-lbl">Add members</div>
    <div class="m-list" id="mList"></div>
    <div class="m-err" id="grpErr"></div>
    <div class="m-acts">
      <button class="mbtn cn" onclick="closeGM()">Cancel</button>
      <button class="mbtn ok" onclick="createGroup()">Create ✨</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// ─── Firebase ───
firebase.initializeApp({
  apiKey:"AIzaSyCt0ItW1VbdnwfHJpTRUxUk5RAhBkgDsJ8",
  authDomain:"asenchata.firebaseapp.com",
  projectId:"asenchata",
  storageBucket:"asenchata.firebasestorage.app",
  messagingSenderId:"1059766104296",
  appId:"1:1059766104296:web:aa69cca63fc1f901af995d"
});
const auth=firebase.auth(), db=firebase.firestore();
const TS=()=>firebase.firestore.FieldValue.serverTimestamp();

// ─── State ───
let myUid=null, myName=null;
let activeId=null, activeType=null, activeName=null, activePeer=null;
let unsubMsgs=null, unsubGroups=null;
let allUsers=[];
let myGroups=[];
let tab='dm';
let sbOpen=false;

let unread={};
let lastMsg={};     // {cid:{text,mine,ts}} — last known message per conversation
let lastActivity={}; // {cid:ms} — for sorting (most recent to top)
let seenSet=new Set(JSON.parse(sessionStorage.getItem('ac_seen')||'[]'));
function saveSeen(){try{sessionStorage.setItem('ac_seen',JSON.stringify([...seenSet].slice(-400)));}catch(e){}}

const $=id=>document.getElementById(id);
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function dmId(a,b){return[a,b].sort().join('__')}
function ini(n){return(n||'?')[0].toUpperCase()}
function fmtT(ts){const d=ts&&ts.toDate?ts.toDate():new Date();return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}
function fmtD(ts){
  const d=ts&&ts.toDate?ts.toDate():new Date(),t=new Date();
  if(d.toDateString()===t.toDateString())return'Today';
  const y=new Date(t);y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString())return'Yesterday';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function ago(ts){
  if(!ts||!ts.toDate)return'';
  const m=Math.floor((Date.now()-ts.toDate().getTime())/60000);
  if(m<2)return'now';if(m<60)return m+'m';if(m<1440)return Math.floor(m/60)+'h';return Math.floor(m/1440)+'d';
}

// ─── Sidebar ───
$('sbBtn').onclick=()=>sbOpen?closeSb():openSb();
function openSb(){sbOpen=true;$('sidebar').classList.remove('closed');$('sbVeil').style.display=''}
function closeSb(){sbOpen=false;$('sidebar').classList.add('closed');$('sbVeil').style.display='none'}
function goBack(){closeSb();$('chatBody').style.display='none';$('chatPh').style.display='flex';activeId=null;activeType=null}

// ─── Persist session ───
function saveS(){localStorage.setItem('ac_n',myName);localStorage.setItem('ac_u',myUid)}
function clearS(){localStorage.removeItem('ac_n');localStorage.removeItem('ac_u')}
function getS(){return{n:localStorage.getItem('ac_n'),u:localStorage.getItem('ac_u')}}

// ─── Auto-resume ───
(function(){
  const s=getS();
  if(s.n&&s.u){$('nameIn').value=s.n;setErr('Resuming…','var(--ink3)');doJoin();}
})();
$('joinBtn').onclick=doJoin;
$('nameIn').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();doJoin()}};

async function doJoin(){
  const name=$('nameIn').value.trim();
  if(!name){setErr('Enter a display name.');return}
  if(name.length<2){setErr('Name needs at least 2 characters.');return}
  if(!/^[a-zA-Z0-9_.\- ]+$/.test(name)){setErr('Letters, numbers, _ . - only.');return}
  $('joinBtn').disabled=true;$('joinBtn').textContent='Connecting…';
  try{
    const cred=await auth.signInAnonymously();
    myUid=cred.user.uid; myName=name;
    const snap=await db.collection('users').where('name','==',name).get();
    if(snap.docs.some(d=>d.id!==myUid)){setErr('Name taken, try another.');reset();return}
    await db.collection('users').doc(myUid).set({name,uid:myUid,lastSeen:TS()},{merge:true});
    if($('remMe').checked)saveS(); else clearS();
    $('myNameDisp').textContent=name;
    $('myAv').textContent=ini(name);
    $('setup').style.display='none';
    $('app').classList.add('live');
    if(window.innerWidth>768)openSb();
    startApp();
  }catch(e){console.error(e);setErr('Connection error, try again.');reset()}
}
function setErr(msg,c='var(--R)'){$('sErr').textContent=msg;$('sErr').style.color=c}
function reset(){$('joinBtn').disabled=false;$('joinBtn').textContent='Enter AscentChat'}

// ─── App start ───
function startApp(){
  hb(); setInterval(hb,30000);
  listenUsers();
  listenMyGroups();
  buildEp();
}
function hb(){if(myUid)db.collection('users').doc(myUid).update({lastSeen:TS()}).catch(()=>{})}

// ─── Users listener ───
function listenUsers(){
  db.collection('users').onSnapshot(snap=>{
    allUsers=[];
    snap.forEach(d=>{const u=d.data();if(u.uid!==myUid)allUsers.push(u)});
    allUsers.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    renderList();
    startGroupPingListeners();
  });
}

// ─── Groups listener ───
function listenMyGroups(){
  if(unsubGroups)unsubGroups();
  unsubGroups=db.collection('groups').where('members','array-contains',myUid)
    .onSnapshot(snap=>{
      myGroups=snap.docs.map(d=>({id:d.id,...d.data()}));
      myGroups.sort((a,b)=>{
        const ta=a.updatedAt&&a.updatedAt.toDate?a.updatedAt.toDate().getTime():0;
        const tb=b.updatedAt&&b.updatedAt.toDate?b.updatedAt.toDate().getTime():0;
        return tb-ta;
      });
      if(tab==='grp')renderList();
      startGroupPingListeners();
    },err=>{console.error('Groups listener error:',err);if(tab==='grp')renderList()});
}

// ─── Tab ───
function setTab(t){
  tab=t;
  $('tDM').classList.toggle('on',t==='dm');
  $('tGrp').classList.toggle('on',t==='grp');
  $('ngBtn').classList.toggle('show',t==='grp');
  renderList();
}
$('sbSearch').oninput=renderList;

// ─── Render sidebar list ───
function renderList(){
  const q=$('sbSearch').value.trim().toLowerCase();
  const list=$('convList');
  if(tab==='dm'){
    let users=q?allUsers.filter(u=>(u.name||'').toLowerCase().includes(q)):allUsers;
    if(!users.length){list.innerHTML=`<div class="c-empty">${q?'No users found.':'No one else here yet.<br>Share the link! 🔗'}</div>`;return}
    // sort: unread first by lastActivity desc, then by lastActivity desc (recent msgs), then alpha
    users=[...users].sort((a,b)=>{
      const ca=dmId(myUid,a.uid), cb=dmId(myUid,b.uid);
      const ua=!!unread[ca], ub=!!unread[cb];
      if(ua!==ub)return ua?-1:1;
      const ta=lastActivity[ca]||0, tb=lastActivity[cb]||0;
      if(ta!==tb)return tb-ta;
      return (a.name||'').localeCompare(b.name||'');
    });
    list.innerHTML='';
    users.forEach(u=>{
      const cid=dmId(myUid,u.uid);
      const isAct=activeId===cid&&activeType==='dm';
      const online=u.lastSeen&&(Date.now()-u.lastSeen.toDate().getTime()<90000);
      const ur=unread[cid]||null;
      const lm=lastMsg[cid]||null;
      let previewText, previewUnread=false;
      if(ur){previewText=ur.preview;previewUnread=true;}
      else if(lm){previewText=lm.mine?'You: '+lm.text:lm.text;}
      else{previewText='Tap to message';}
      const el=document.createElement('div');
      el.className='ci'+(isAct?' on':ur?' has-unread':'');
      el.innerHTML=`
        <div class="ci-av">${ini(u.name)}${online?'<div class="ci-dot"></div>':''}</div>
        <div class="ci-info">
          <div class="ci-name">${esc(u.name)}</div>
          <div class="ci-preview${previewUnread?' unread':''}">${esc(previewText.slice(0,40))}</div>
        </div>
        <div class="ci-meta">
          <div class="ci-time">${ur?'now':ago(u.lastSeen)}</div>
          ${ur?`<div class="ci-udot"></div>`:''}
        </div>`;
      el.onclick=()=>{openDM(u.uid,u.name);};
      list.appendChild(el);
    });
  } else {
    let groups=q?myGroups.filter(g=>(g.name||'').toLowerCase().includes(q)):myGroups;
    if(!groups.length){
      list.innerHTML='<div class="c-empty">No group chats yet.<br>Create one! 🎉</div>';
      return;
    }
    list.innerHTML='';
    groups.forEach(g=>{
      const isAct=activeId===g.id&&activeType==='group';
      const ur=unread[g.id]||null;
      const lm=lastMsg[g.id]||null;
      let previewText, previewUnread=false;
      if(ur){previewText=ur.preview;previewUnread=true;}
      else if(lm){previewText=lm.mine?'You: '+lm.text:lm.text;}
      else if(g.lastMsg){previewText=g.lastMsg;}
      else{previewText=g.members?g.members.length+' members':'Group chat';}
      const el=document.createElement('div');
      el.className='ci'+(isAct?' on':ur?' has-unread':'');
      el.innerHTML=`
        <div class="ci-av">👥</div>
        <div class="ci-info">
          <div class="ci-name">${esc(g.name||'Unnamed group')}</div>
          <div class="ci-preview${previewUnread?' unread':''}">${esc(previewText.slice(0,40))}</div>
        </div>
        <div class="ci-meta">
          <div class="ci-time">${ur?'now':ago(g.updatedAt)}</div>
          ${ur?`<div class="ci-udot"></div>`:''}
        </div>`;
      el.onclick=()=>openGroup(g.id,g.name,g.members||[]);
      list.appendChild(el);
    });
  }
  updateGlobalBadge();
}

function updateGlobalBadge(){
  const total=Object.values(unread).reduce((s,v)=>s+v.count,0);
  const badge=$('globalBadge');
  if(total>0){badge.textContent=total>99?'99+':total;badge.classList.add('show')}
  else badge.classList.remove('show');
  document.title=total>0?`(${total}) AscentChat`:'AscentChat · ASCENTA 3';
}

function markRead(cid){
  if(unread[cid]){delete unread[cid];renderList()}
}

// ─── Open DM ───
function openDM(uid,name){
  activeType='dm'; activeId=dmId(myUid,uid); activeName=name; activePeer=uid;
  mountChat(ini(name),name,'Direct message');
  markRead(activeId);
  if(window.innerWidth<=768)closeSb();
}

// ─── Open Group ───
function openGroup(id,name,members){
  activeType='group'; activeId=id; activeName=name; activePeer=null;
  const others=(members||[]).filter(m=>m!==myUid).map(uid=>{
    const u=allUsers.find(x=>x.uid===uid);
    return u?u.name:uid.slice(0,6);
  });
  const subText=`${(members||[]).length} members${others.length?' · '+others.slice(0,3).join(', ')+(others.length>3?'…':''):''}`;
  mountChat('👥',name||'Group',subText);
  markRead(activeId);
  if(window.innerWidth<=768)closeSb();
}

// ─── Mount chat view ───
function mountChat(av,name,sub){
  $('chatPh').style.display='none';
  $('chatBody').style.display='flex';
  $('chAv').textContent=av;
  $('chName').textContent=name;
  $('chSub').textContent=sub;
  $('msgs').innerHTML='<div class="c-empty"><div class="spin"></div></div>';
  setTimeout(()=>$('chatIn').focus(),100);
  renderList();
  if(unsubMsgs)unsubMsgs();
  const colRef=(activeType==='dm'
    ?db.collection('conversations').doc(activeId).collection('messages')
    :db.collection('groups').doc(activeId).collection('messages')
  ).orderBy('timestamp','asc');

  let firstLoad=true;
  unsubMsgs=colRef.onSnapshot(snap=>{
    snap.docChanges().forEach(ch=>{
      if(ch.type==='added'){
        const m=ch.doc.data(), mid=ch.doc.id;
        seenSet.add(mid); saveSeen();
        if(!firstLoad && m.from!==myUid){
          markRead(activeId);
        }
      }
    });
    firstLoad=false;
    const allMsgs=snap.docs.map(d=>({id:d.id,...d.data()}));
    // track last known message for preview
    const nonSys=allMsgs.filter(m=>!m.system);
    if(nonSys.length){
      const lm=nonSys[nonSys.length-1];
      const mine=lm.from===myUid;
      const cid2=activeId;
      lastMsg[cid2]={text:lm.text||'',mine,ts:lm.timestamp&&lm.timestamp.toDate?lm.timestamp.toDate().getTime():Date.now()};
      if(!lastActivity[cid2])lastActivity[cid2]=lastMsg[cid2].ts;
    }
    renderMsgs(allMsgs);
  }, err=>{ console.error('Msgs error:', err); $('msgs').innerHTML='<div class="c-empty">Error loading messages.</div>'; });
}

// ─── Render messages ───
const REACT_E=['👍','❤️','😂','😮','😢','🔥'];
function renderMsgs(msgs){
  const el=$('msgs');
  const atBot=el.scrollHeight-el.scrollTop-el.clientHeight<80;
  if(!msgs.length){el.innerHTML='<div class="c-empty" style="margin-top:40px">No messages yet 👋<br>Say hello!</div>';return}
  el.innerHTML='';
  let lastDate='',lastFrom='';
  msgs.forEach((m)=>{
    const ds=fmtD(m.timestamp);
    if(ds!==lastDate){
      lastDate=ds;
      const lbl=document.createElement('div');
      lbl.className='day-lbl';lbl.innerHTML=`<span>${esc(ds)}</span>`;
      el.appendChild(lbl);
    }
    if(m.system){
      const sb=document.createElement('div');sb.className='mrow sys';
      sb.innerHTML=`<div class="sys-pill">${esc(m.text)}</div>`;
      el.appendChild(sb);lastFrom='';return;
    }
    const mine=m.from===myUid;
    const showAv=!mine&&lastFrom!==m.from;
    const showSender=!mine&&activeType==='group'&&lastFrom!==m.from;
    lastFrom=m.from;
    const sName=mine?myName:(m.fromName||activeName||'?');
    const reactions=m.reactions||{};
    const rHtml=Object.entries(reactions).filter(([,u])=>u.length>0)
      .map(([e,u])=>`<div class="rxn" onclick="toggleReact('${esc(m.id)}','${esc(e)}')">${e}<span>${u.length}</span></div>`).join('');
    const rBar=REACT_E.map(e=>`<span class="rc" onclick="toggleReact('${esc(m.id)}','${esc(e)}')">${e}</span>`).join('');
    const row=document.createElement('div');
    row.className='mrow'+(mine?' me':'');
    row.innerHTML=`
      <div class="m-av ${showAv?'':'hide'}">${ini(sName)}</div>
      <div class="m-body">
        ${showSender?`<div class="m-sender">${esc(sName)}</div>`:''}
        <div class="bw">
          <div class="react-bar">${rBar}</div>
          <div class="bubble">${esc(m.text)}</div>
        </div>
        ${rHtml?`<div class="rxns">${rHtml}</div>`:''}
        <div class="m-time">${fmtT(m.timestamp)}</div>
      </div>`;
    const bw=row.querySelector('.bw');
    let lpt;
    bw.addEventListener('touchstart',()=>{lpt=setTimeout(()=>{bw.classList.add('rbar-open');document.addEventListener('touchstart',()=>bw.classList.remove('rbar-open'),{once:true})},500)},{passive:true});
    bw.addEventListener('touchend',()=>clearTimeout(lpt),{passive:true});
    el.appendChild(row);
  });
  if(atBot)el.scrollTop=el.scrollHeight;
  updFab();
}

function scrollBot(){$('msgs').scrollTop=1e9;updFab()}
function onMsgsScroll(){updFab()}
function updFab(){const el=$('msgs');$('sfab').classList.toggle('show',el.scrollHeight-el.scrollTop-el.clientHeight>120)}

// ─── Reactions ───
async function toggleReact(msgId,emoji){
  if(!activeId||!msgId)return;
  const ref=(activeType==='dm'
    ?db.collection('conversations').doc(activeId)
    :db.collection('groups').doc(activeId)
  ).collection('messages').doc(msgId);
  const snap=await ref.get(); if(!snap.exists)return;
  const rs=snap.data().reactions||{};
  const uids=rs[emoji]||[];
  const i=uids.indexOf(myUid);
  if(i>=0)uids.splice(i,1); else uids.push(myUid);
  if(!uids.length)delete rs[emoji]; else rs[emoji]=uids;
  await ref.update({reactions:rs});
}

// ─── Send message ───
$('sndBtn').onclick=sendMsg;
$('chatIn').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey&&window.innerWidth>600){e.preventDefault();sendMsg()}
});
$('chatIn').addEventListener('input',()=>{
  const t=$('chatIn');t.style.height='auto';t.style.height=Math.min(t.scrollHeight,120)+'px';
});
async function sendMsg(){
  const text=$('chatIn').value.trim();
  if(!text||!activeId)return;
  $('chatIn').value=''; $('chatIn').style.height='';
  const payload={from:myUid,fromName:myName,text,timestamp:TS(),reactions:{}};
  if(activeType==='dm') payload.to=activePeer||'';
  try{
    if(activeType==='dm'){
      await db.collection('conversations').doc(activeId).collection('messages').add(payload);
    } else {
      await db.collection('groups').doc(activeId).collection('messages').add(payload);
      await db.collection('groups').doc(activeId).update({updatedAt:TS(),lastMsg:text});
    }
    lastMsg[activeId]={text,mine:true,ts:Date.now()};
    lastActivity[activeId]=Date.now();
    renderList();
  }catch(e){console.error('Send error:',e)}
}

// ─── Global ping listeners ───
let groupPingUnsubs={};
let dmPingUnsub=null;

function startGroupPingListeners(){
  if(!dmPingUnsub&&myUid){
    dmPingUnsub=db.collectionGroup('messages')
      .where('to','==',myUid)
      .orderBy('timestamp','desc')
      .limit(20)
      .onSnapshot(snap=>{
        snap.docChanges().forEach(ch=>{
          if(ch.type==='added'){
            const m=ch.doc.data(), mid=ch.doc.id;
            if(seenSet.has(mid))return;
            seenSet.add(mid); saveSeen();
            if(m.from===myUid)return;
            const cid=dmId(myUid,m.from);
            if(activeId!==cid){
              bumpUnread(cid,m.fromName||'Someone',m.text);
              showToast(m.fromName||'Someone',m.text,cid,'dm',m.from,m.fromName);
            }
          }
        });
      },err=>console.error('DM ping listener:',err));
  }
  myGroups.forEach(g=>{
    if(groupPingUnsubs[g.id])return;
    groupPingUnsubs[g.id]=db.collection('groups').doc(g.id).collection('messages')
      .orderBy('timestamp','desc').limit(10)
      .onSnapshot(snap=>{
        snap.docChanges().forEach(ch=>{
          if(ch.type==='added'){
            const m=ch.doc.data(), mid=ch.doc.id;
            if(seenSet.has(mid))return;
            seenSet.add(mid); saveSeen();
            if(m.from===myUid||m.system)return;
            if(activeId!==g.id){
              bumpUnread(g.id,m.fromName||'Someone',m.text,g.name);
              showToast(m.fromName||'Someone',m.text,g.id,'group',null,null,g.name);
            }
          }
        });
        if(tab==='grp')renderList();
      },err=>console.error('Group ping listener:',err));
  });
}

function bumpUnread(cid,fromName,text,groupName){
  if(!unread[cid]) unread[cid]={count:0,preview:'',fromName};
  unread[cid].count++;
  unread[cid].preview=(groupName?fromName+': ':'')+text;
  unread[cid].fromName=fromName;
  lastMsg[cid]={text:(groupName?fromName+': ':'')+text,mine:false,ts:Date.now()};
  lastActivity[cid]=Date.now();
  renderList();
}

function showToast(from,text,cid,type,peerUid,peerName,groupName){
  let orig=document.title,fl=true;
  const ti=setInterval(()=>{document.title=fl?`🔔 ${from}: ${text.slice(0,20)}`:orig;fl=!fl},700);
  setTimeout(()=>{clearInterval(ti);updateGlobalBadge()},8000);
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.setValueAtTime(880,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(660,ctx.currentTime+0.15);
    g.gain.setValueAtTime(0,ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.07,ctx.currentTime+0.01);
    g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3);
    o.start();o.stop(ctx.currentTime+0.35);
  }catch(e){}
  const t=document.createElement('div');
  t.className='toast';
  const label=groupName?`${from} in ${groupName}`:from;
  t.innerHTML=`<div class="t-av">${ini(from)}</div><div class="t-body"><div class="t-who">${esc(label)}</div><div class="t-msg">${esc(text.slice(0,60))}</div></div>`;
  const dismiss=()=>{t.classList.add('bye');setTimeout(()=>t.remove(),220)};
  t.onclick=()=>{
    dismiss();
    if(type==='dm'&&peerUid)openDM(peerUid,peerName||from);
    else if(type==='group'){
      const grp=myGroups.find(g=>g.id===cid);
      if(grp)openGroup(grp.id,grp.name,grp.members||[]);
      setTab('grp');
    }
    openSb();
  };
  $('toasts').appendChild(t);
  setTimeout(dismiss,6000);
}

// ─── Emoji picker ───
const EMOJIS=['😀','😂','🥰','😎','🤔','😭','🥳','🎉','🔥','💯','👍','👎','❤️','💔','✨','🌟','😅','🤣','😊','🥺','😍','🤩','🎊','🙌','💪','🤝','👏','🫡','😏','🤓','😴','🫶','💀','🤯','🫠','👀','🌈','🍕','🍔','🎮','🎵','⚡','💎','🚀','🌙','☀️','⭐','🦋','🌺','🐶','🐱','🎸','🍎','🌊','🏆','🎯','🧠','🪄','💫','🍀','🎀'];
function buildEp(){
  const p=$('epPop'),g=document.createElement('div');g.className='ep-grid';
  EMOJIS.forEach(e=>{const b=document.createElement('div');b.className='ep';b.textContent=e;b.onclick=()=>insE(e);g.appendChild(b)});
  p.appendChild(g);
}
function toggleEp(){$('epPop').classList.toggle('open')}
function insE(e){const t=$('chatIn');const pos=t.selectionStart||t.value.length;t.value=t.value.slice(0,pos)+e+t.value.slice(pos);t.focus();const np=pos+e.length;t.setSelectionRange(np,np)}
document.addEventListener('click',e=>{if(!e.target.closest('#epPop')&&!e.target.closest('#emBtn'))$('epPop').classList.remove('open')});

// ─── Group modal ───
function openGM(e){
  e&&e.stopPropagation();
  const c=$('mList');
  c.innerHTML='';
  if(!allUsers.length){
    c.innerHTML='<div class="c-empty">No other users yet.</div>';
  } else {
    allUsers.forEach(u=>{
      const l=document.createElement('label');l.className='m-ck';
      l.innerHTML=`<input type="checkbox" value="${esc(u.uid)}"><span class="m-ck-name">${esc(u.name)}</span>`;
      c.appendChild(l);
    });
  }
  $('grpErr').textContent='';$('grpName').value='';
  $('grpOv').classList.add('open');
}
function closeGM(){$('grpOv').classList.remove('open')}
async function createGroup(){
  const name=$('grpName').value.trim();
  if(!name){$('grpErr').textContent='Enter a group name.';return}
  const checked=[...$('mList').querySelectorAll('input:checked')];
  if(!checked.length){$('grpErr').textContent='Select at least 1 member.';return}
  $('grpErr').textContent='Creating…';
  const members=[myUid,...checked.map(c=>c.value)];
  try{
    const ref=await db.collection('groups').add({
      name, members,
      createdBy:myUid,
      createdAt:TS(),
      updatedAt:TS(),
      lastMsg:''
    });
    await db.collection('groups').doc(ref.id).collection('messages').add({
      system:true,
      text:`${myName} created "${name}" 🎉`,
      from:'system',fromName:'System',
      timestamp:TS(),reactions:{}
    });
    closeGM();
    setTab('grp');
    openGroup(ref.id,name,members);
  }catch(e){$('grpErr').textContent='Error: '+e.message;console.error(e)}
}

$('grpOv').addEventListener('click',e=>{if(e.target===$('grpOv'))closeGM()});

// ─── Rename ───
function openRename(){
  $('renameInput').value=myName||'';
  $('rpErr').textContent='';
  $('renamePop').classList.add('open');
  setTimeout(()=>{$('renameInput').focus();$('renameInput').select()},50);
}
function closeRename(){$('renamePop').classList.remove('open')}
$('renameInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();confirmRename()}
  if(e.key==='Escape'){closeRename()}
});
document.addEventListener('click',e=>{
  if($('renamePop').classList.contains('open')&&!e.target.closest('#renamePop')&&!e.target.closest('.tb-chip'))closeRename();
});
async function confirmRename(){
  const name=$('renameInput').value.trim();
  if(!name){$('rpErr').textContent='Enter a name.';return}
  if(name.length<2){$('rpErr').textContent='At least 2 characters.';return}
  if(!/^[a-zA-Z0-9_.\- ]+$/.test(name)){$('rpErr').textContent='Letters, numbers, _ . - only.';return}
  if(name===myName){closeRename();return}
  $('rpErr').textContent='Checking…';
  try{
    const snap=await db.collection('users').where('name','==',name).get();
    if(snap.docs.some(d=>d.id!==myUid)){$('rpErr').textContent='Name taken, try another.';return}
    await db.collection('users').doc(myUid).update({name});
    myName=name;
    $('myNameDisp').textContent=name;
    $('myAv').textContent=ini(name);
    if($('remMe').checked)saveS();
    closeRename();
  }catch(e){$('rpErr').textContent='Error, try again.';console.error(e)}
}
