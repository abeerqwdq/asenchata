<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AscentChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;
  --bg2:#e8e4de;
  --bg3:#faf8f5;
  --surface:#ffffff;
  --surface2:rgba(255,255,255,0.7);
  --ink:#1a1814;
  --ink2:#4a4540;
  --ink3:#8a8480;
  --ink4:#b0aca8;
  --line:rgba(60,50,40,0.1);
  --line2:rgba(60,50,40,0.18);
  --accent:#c17a45;
  --accent2:#e8a060;
  --accent-soft:rgba(193,122,69,0.12);
  --accent-glow:rgba(193,122,69,0.3);
  --blue:#4a7eb5;
  --blue-soft:rgba(74,126,181,0.12);
  --green:#5a9e6f;
  --red:#c45a5a;
  --bubble-me:linear-gradient(135deg,#c17a45,#d4894f);
  --bubble-them:#ffffff;
  --mono:'Geist Mono',ui-monospace,monospace;
  --serif:'Lora',Georgia,serif;
  --r:14px;
  --r-sm:8px;
  --shadow:0 2px 12px rgba(60,40,20,0.1);
  --shadow-lg:0 8px 40px rgba(60,40,20,0.18);
  --transition:.2s cubic-bezier(.4,0,.2,1);
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--mono)}

/* ── PING NOTIFICATION ── */
#ping-container{
  position:fixed;top:20px;right:20px;z-index:9999;
  display:flex;flex-direction:column;gap:10px;
  pointer-events:none;
}
.ping-toast{
  background:var(--surface);
  border:1px solid var(--line2);
  border-radius:var(--r);
  padding:14px 18px;
  box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:12px;
  pointer-events:all;
  animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) forwards;
  max-width:320px;
  cursor:pointer;
}
.ping-toast.out{animation:toastOut .25s ease-in forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(60px) scale(.9)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateX(60px) scale(.9)}}
.ping-av{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:600;flex:0 0 36px;
  background:var(--accent-soft);color:var(--accent);
}
.ping-body{}
.ping-who{font-size:12px;font-weight:600;color:var(--ink)}
.ping-preview{font-size:11px;color:var(--ink3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.ping-dot{
  position:fixed;top:0;right:0;z-index:9998;
  width:10px;height:10px;border-radius:50%;
  background:var(--red);
  box-shadow:0 0 0 2px var(--bg);
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}

/* ── SETUP ── */
#setup{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.setup-wrap{
  display:flex;flex-direction:column;align-items:center;
  gap:0;
  width:min(440px,94vw);
}
.setup-brand{
  font-family:var(--serif);
  font-size:48px;
  font-weight:600;
  color:var(--ink);
  letter-spacing:-2px;
  margin-bottom:4px;
  line-height:1;
}
.setup-brand span{color:var(--accent)}
.setup-tagline{
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--ink3);
  margin-bottom:40px;
}
.setup-card{
  width:100%;
  background:var(--surface);
  border:1px solid var(--line2);
  border-radius:20px;
  padding:36px;
  box-shadow:var(--shadow-lg);
}
.setup-section{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.setup-input{
  width:100%;
  padding:13px 16px;
  background:var(--bg);
  border:1.5px solid var(--line2);
  border-radius:var(--r-sm);
  color:var(--ink);
  font-family:var(--mono);
  font-size:14px;
  outline:none;
  transition:var(--transition);
  margin-bottom:14px;
}
.setup-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.setup-input::placeholder{color:var(--ink4)}
.setup-btn{
  width:100%;
  padding:14px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:var(--r-sm);
  font-family:var(--mono);
  font-size:13px;
  letter-spacing:1px;
  font-weight:500;
  cursor:pointer;
  transition:var(--transition);
}
.setup-btn:hover{background:var(--accent2);box-shadow:0 4px 20px var(--accent-glow)}
.setup-btn:active{transform:scale(.98)}
.setup-err{margin-top:12px;font-size:11px;color:var(--red);min-height:16px}
.setup-remember{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--ink3);
  margin-bottom:16px;cursor:pointer;
  user-select:none;
}
.setup-remember input{accent-color:var(--accent)}
.setup-divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;font-size:10px;color:var(--ink4);letter-spacing:1px;text-transform:uppercase;
}
.setup-divider::before,.setup-divider::after{content:'';flex:1;height:1px;background:var(--line)}

/* ── MAIN ── */
#app{display:none;height:100%;flex-direction:column}
#app.live{display:flex}

/* Top bar */
.topbar{
  height:52px;flex:0 0 auto;
  display:flex;align-items:center;gap:14px;
  padding:0 20px;
  background:var(--surface);
  border-bottom:1px solid var(--line);
  box-shadow:0 1px 0 var(--line);
  z-index:10;
}
.topbar-brand{
  font-family:var(--serif);
  font-size:22px;font-weight:600;
  color:var(--ink);letter-spacing:-1px;
}
.topbar-brand span{color:var(--accent)}
.topbar-grow{flex:1}
.topbar-pill{
  display:flex;align-items:center;gap:8px;
  padding:6px 14px;
  background:var(--accent-soft);
  border-radius:100px;
  font-size:11px;color:var(--accent);font-weight:500;
}
.topbar-av{
  width:24px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
  background:var(--accent);color:#fff;
}
.topbar-status{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 2px #fff;
}

/* Layout */
.main{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:260px;flex:0 0 260px;
  background:var(--bg3);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-top{
  padding:16px 16px 12px;
  border-bottom:1px solid var(--line);
  display:flex;flex-direction:column;gap:10px;
}
.sidebar-search{
  width:100%;
  padding:9px 13px;
  background:var(--bg);
  border:1.5px solid var(--line);
  border-radius:var(--r-sm);
  color:var(--ink);
  font-family:var(--mono);
  font-size:12px;
  outline:none;
  transition:var(--transition);
}
.sidebar-search:focus{border-color:var(--accent);background:var(--surface)}
.sidebar-search::placeholder{color:var(--ink4)}
.sidebar-tabs{
  display:flex;gap:4px;
  background:var(--bg2);
  border-radius:var(--r-sm);
  padding:3px;
}
.sidebar-tab{
  flex:1;
  padding:6px;
  text-align:center;
  font-size:10px;letter-spacing:.8px;text-transform:uppercase;
  color:var(--ink3);
  border-radius:6px;
  cursor:pointer;
  transition:var(--transition);
  font-weight:500;
}
.sidebar-tab.active{
  background:var(--surface);
  color:var(--accent);
  box-shadow:0 1px 4px rgba(60,40,20,0.1);
}
.new-group-btn{
  width:100%;
  padding:8px;
  background:var(--accent-soft);
  border:1.5px dashed rgba(193,122,69,0.3);
  border-radius:var(--r-sm);
  color:var(--accent);
  font-family:var(--mono);
  font-size:11px;letter-spacing:.5px;font-weight:500;
  cursor:pointer;
  transition:var(--transition);
  display:none;
}
.new-group-btn:hover{background:rgba(193,122,69,0.2)}
#tabGroups .new-group-btn{display:block}

.conv-list{
  flex:1;overflow-y:auto;padding:8px 8px;
  display:flex;flex-direction:column;gap:2px;
}
.conv-list::-webkit-scrollbar{width:3px}
.conv-list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

.conv-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  border-radius:var(--r-sm);
  cursor:pointer;
  transition:var(--transition);
  position:relative;
}
.conv-item:hover{background:var(--bg2)}
.conv-item.active{background:var(--accent-soft)}
.conv-av{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:600;flex:0 0 36px;
  background:var(--bg2);color:var(--ink3);
  border:1.5px solid var(--line);
  transition:var(--transition);
  position:relative;
}
.conv-item.active .conv-av{background:var(--accent);color:#fff;border-color:transparent}
.conv-item.active .conv-av .online-dot{border-color:var(--accent-soft)}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:0 0 auto}
.conv-time{font-size:10px;color:var(--ink4)}
.conv-badge{
  min-width:18px;height:18px;border-radius:9px;
  background:var(--accent);color:#fff;
  font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;
}
.online-dot{
  position:absolute;bottom:-2px;right:-2px;
  width:10px;height:10px;border-radius:50%;
  background:var(--green);border:2px solid var(--bg3);
}
.conv-empty{
  padding:32px 16px;text-align:center;
  font-size:11px;color:var(--ink4);line-height:1.8;
}

/* ── CHAT AREA ── */
.chat{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;background:var(--bg);
}
.chat-placeholder{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;
}
.chat-placeholder-icon{
  font-size:52px;opacity:.25;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.chat-placeholder-text{font-size:13px;color:var(--ink4);letter-spacing:.5px}

.chat-header{
  height:56px;flex:0 0 auto;
  display:flex;align-items:center;gap:12px;
  padding:0 20px;
  background:var(--surface);
  border-bottom:1px solid var(--line);
  box-shadow:0 1px 0 var(--line);
}
.chat-header-av{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:600;
  background:var(--accent-soft);color:var(--accent);
  border:1.5px solid rgba(193,122,69,0.2);
  position:relative;
}
.chat-header-info{flex:1}
.chat-header-name{font-size:14px;font-weight:600;color:var(--ink)}
.chat-header-sub{font-size:10px;color:var(--ink3);margin-top:1px}
.chat-header-actions{display:flex;gap:8px}
.icon-btn{
  width:32px;height:32px;border-radius:8px;
  border:1px solid var(--line);
  background:transparent;color:var(--ink3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--transition);font-size:15px;
}
.icon-btn:hover{background:var(--bg2);color:var(--ink);border-color:var(--line2)}

/* Messages */
.messages{
  flex:1;overflow-y:auto;
  padding:20px 24px;
  display:flex;flex-direction:column;
  gap:2px;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

.day-label{
  text-align:center;
  font-size:10px;letter-spacing:1px;text-transform:uppercase;
  color:var(--ink4);
  margin:14px 0 8px;
  display:flex;align-items:center;gap:10px;
}
.day-label::before,.day-label::after{content:'';flex:1;height:1px;background:var(--line)}

.msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:2px}
.msg-row.mine{flex-direction:row-reverse}
.msg-row.system{justify-content:center;margin:8px 0}
.system-bubble{
  font-size:11px;color:var(--ink3);
  background:var(--bg2);
  padding:4px 14px;border-radius:100px;
  border:1px solid var(--line);
}
.msg-av{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex:0 0 28px;
  background:var(--bg2);color:var(--ink3);
  border:1px solid var(--line);
}
.msg-av.hidden{visibility:hidden}
.msg-content{display:flex;flex-direction:column;max-width:65%}
.msg-row.mine .msg-content{align-items:flex-end}
.msg-sender{font-size:10px;color:var(--ink3);margin-bottom:3px;margin-left:2px}
.bubble{
  padding:10px 14px;
  border-radius:16px;
  font-size:13.5px;
  line-height:1.6;
  word-break:break-word;
  white-space:pre-wrap;
  position:relative;
}
.msg-row:not(.mine) .bubble{
  background:var(--bubble-them);
  border:1px solid var(--line);
  color:var(--ink);
  border-bottom-left-radius:4px;
  box-shadow:0 1px 3px rgba(60,40,20,0.06);
}
.msg-row.mine .bubble{
  background:var(--bubble-me);
  color:#fff;
  border-bottom-right-radius:4px;
  box-shadow:0 2px 8px var(--accent-glow);
}
.bubble-reactions{
  display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;
}
.reaction-btn{
  font-size:13px;padding:2px 6px;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:100px;cursor:pointer;transition:var(--transition);
  display:flex;align-items:center;gap:3px;font-family:inherit;
}
.reaction-btn:hover{background:var(--bg);border-color:var(--accent)}
.reaction-count{font-size:10px;color:var(--ink3)}
.msg-time-row{display:flex;align-items:center;gap:6px;margin-top:3px}
.msg-time{font-size:10px;color:var(--ink4)}
.msg-row.mine .msg-time-row{flex-direction:row-reverse}

/* Emoji picker */
.emoji-bar{
  display:none;
  position:absolute;
  bottom:calc(100% + 6px);right:0;
  background:var(--surface);
  border:1px solid var(--line2);
  border-radius:var(--r);
  padding:8px 10px;
  box-shadow:var(--shadow-lg);
  gap:4px;
  z-index:50;
  white-space:nowrap;
}
.bubble-wrap{position:relative}
.bubble-wrap:hover .emoji-bar{display:flex}
.emoji-choice{font-size:18px;cursor:pointer;padding:3px;border-radius:6px;transition:var(--transition)}
.emoji-choice:hover{background:var(--bg2);transform:scale(1.2)}

/* Input area */
.input-area{
  flex:0 0 auto;
  padding:14px 20px;
  border-top:1px solid var(--line);
  background:var(--surface);
  display:flex;flex-direction:column;gap:10px;
}
.input-row{display:flex;align-items:flex-end;gap:10px}
.emoji-toggle{
  width:36px;height:36px;border-radius:10px;
  border:1.5px solid var(--line);
  background:transparent;color:var(--ink3);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:var(--transition);flex:0 0 36px;
}
.emoji-toggle:hover{background:var(--bg2);border-color:var(--line2)}
.emoji-picker-popup{
  position:absolute;bottom:80px;left:20px;
  background:var(--surface);border:1px solid var(--line2);
  border-radius:var(--r);padding:12px;
  box-shadow:var(--shadow-lg);
  display:none;z-index:100;
  width:300px;
}
.emoji-picker-popup.open{display:block}
.emoji-grid{
  display:grid;grid-template-columns:repeat(8,1fr);
  gap:4px;max-height:180px;overflow-y:auto;
}
.emoji-pick{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;text-align:center;transition:var(--transition)}
.emoji-pick:hover{background:var(--bg2);transform:scale(1.15)}
.chat-input{
  flex:1;
  padding:11px 16px;
  background:var(--bg);
  border:1.5px solid var(--line);
  border-radius:var(--r-sm);
  color:var(--ink);
  font-family:var(--mono);
  font-size:13px;
  outline:none;
  resize:none;
  min-height:42px;max-height:130px;
  line-height:1.6;
  transition:var(--transition);
}
.chat-input:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft)}
.chat-input::placeholder{color:var(--ink4)}
.send-btn{
  width:42px;height:42px;border-radius:10px;
  border:none;background:var(--accent);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:var(--transition);flex:0 0 42px;
  box-shadow:0 2px 8px var(--accent-glow);
}
.send-btn:hover{background:var(--accent2);box-shadow:0 4px 16px var(--accent-glow)}
.send-btn:active{transform:scale(.93)}
.send-btn svg{width:16px;height:16px}
.typing-indicator{
  font-size:11px;color:var(--ink3);
  display:flex;align-items:center;gap:6px;
}
.typing-dots{display:flex;gap:3px}
.typing-dots span{
  width:5px;height:5px;border-radius:50%;
  background:var(--ink3);
  animation:typedot 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typedot{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ── GROUP MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(30,20,10,0.35);
  backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);
  border:1px solid var(--line2);
  border-radius:20px;
  padding:32px;
  width:min(420px,92vw);
  box-shadow:var(--shadow-lg);
}
.modal-title{
  font-family:var(--serif);
  font-size:22px;font-weight:600;
  color:var(--ink);margin-bottom:6px;
}
.modal-sub{font-size:12px;color:var(--ink3);margin-bottom:24px}
.modal-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.modal-input{
  width:100%;padding:11px 14px;
  background:var(--bg);border:1.5px solid var(--line);
  border-radius:var(--r-sm);
  color:var(--ink);font-family:var(--mono);font-size:13px;
  outline:none;margin-bottom:16px;transition:var(--transition);
}
.modal-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.member-checkboxes{
  max-height:180px;overflow-y:auto;
  display:flex;flex-direction:column;gap:6px;
  margin-bottom:20px;
  padding:4px;
}
.member-check{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:var(--r-sm);
  cursor:pointer;transition:var(--transition);
  border:1px solid transparent;
}
.member-check:hover{background:var(--bg2)}
.member-check input{accent-color:var(--accent)}
.member-check-name{font-size:13px;color:var(--ink)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.modal-btn{
  padding:10px 22px;border-radius:var(--r-sm);
  font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.5px;
  cursor:pointer;transition:var(--transition);
}
.modal-btn.cancel{background:transparent;border:1.5px solid var(--line);color:var(--ink3)}
.modal-btn.cancel:hover{background:var(--bg2)}
.modal-btn.primary{background:var(--accent);border:none;color:#fff;box-shadow:0 2px 8px var(--accent-glow)}
.modal-btn.primary:hover{background:var(--accent2)}
.modal-err{font-size:11px;color:var(--red);margin-bottom:12px;min-height:16px}

/* spinner */
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}

/* scroll to bottom fab */
.scroll-fab{
  position:absolute;bottom:90px;right:24px;
  width:36px;height:36px;border-radius:50%;
  background:var(--accent);color:#fff;
  border:none;box-shadow:var(--shadow-lg);
  display:none;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;
  transition:var(--transition);
  z-index:5;
}
.scroll-fab.visible{display:flex}
.scroll-fab:hover{background:var(--accent2)}
</style>
</head>
<body>

<!-- ── PING CONTAINER ── -->
<div id="ping-container"></div>

<!-- ── SETUP ── -->
<div id="setup">
  <div class="setup-wrap">
    <div class="setup-brand">Ascen<span>Chat</span></div>
    <div class="setup-tagline">Real-time · Group chats · Beautiful</div>
    <div class="setup-card">
      <div id="setupMain">
        <div class="setup-section">Your display name</div>
        <input class="setup-input" id="nameInput" type="text" maxlength="24" placeholder="e.g. luna_84" autocomplete="off">
        <label class="setup-remember">
          <input type="checkbox" id="rememberMe" checked>
          Remember me on this device
        </label>
        <button class="setup-btn" id="joinBtn">✨ Enter AscentChat</button>
        <div class="setup-err" id="setupErr"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <div class="topbar">
    <span class="topbar-brand">Ascen<span>Chat</span></span>
    <span class="topbar-grow"></span>
    <div class="topbar-pill">
      <div class="topbar-av" id="myAvatar">?</div>
      <span id="myNameDisplay">—</span>
      <div class="topbar-status"></div>
    </div>
  </div>
  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-top">
        <input class="sidebar-search" id="userSearch" type="text" placeholder="🔍  Search…">
        <div class="sidebar-tabs">
          <div class="sidebar-tab active" id="tabDMs" onclick="switchTab('dms')">💬 DMs</div>
          <div class="sidebar-tab" id="tabGroups" onclick="switchTab('groups')">👥 Groups
            <button class="new-group-btn" onclick="openGroupModal(event)">＋ New group</button>
          </div>
        </div>
        <button class="new-group-btn" id="newGroupSideBtn" onclick="openGroupModal(event)" style="display:none">＋ Create Group Chat</button>
      </div>
      <div class="conv-list" id="convList">
        <div class="conv-empty"><div class="spin"></div><div style="margin-top:12px">Loading…</div></div>
      </div>
    </div>
    <!-- Chat -->
    <div class="chat" id="chatPanel" style="position:relative">
      <div class="chat-placeholder" id="chatPlaceholder">
        <div class="chat-placeholder-icon">💬</div>
        <div class="chat-placeholder-text">Select a conversation to begin</div>
      </div>
      <div id="chatActive" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="chat-header">
          <div class="chat-header-av" id="chatAv">?</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chatName">—</div>
            <div class="chat-header-sub" id="chatSub">—</div>
          </div>
        </div>
        <div class="messages" id="messages" onscroll="handleMsgScroll()"></div>
        <button class="scroll-fab" id="scrollFab" onclick="scrollToBottom()" title="Jump to bottom">↓</button>
        <div class="input-area" style="position:relative">
          <div class="emoji-picker-popup" id="emojiPicker"></div>
          <div class="typing-indicator" id="typingIndicator" style="display:none">
            <div class="typing-dots"><span></span><span></span><span></span></div>
            <span id="typingText"></span>
          </div>
          <div class="input-row">
            <button class="emoji-toggle" id="emojiToggle" onclick="toggleEmojiPicker()" title="Emoji">😊</button>
            <textarea class="chat-input" id="chatInput" rows="1" placeholder="Message…"></textarea>
            <button class="send-btn" id="sendBtn" title="Send (Enter)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── GROUP MODAL ── -->
<div class="modal-overlay" id="groupModal">
  <div class="modal">
    <div class="modal-title">Create group chat</div>
    <div class="modal-sub">Name your group and pick who joins</div>
    <div class="modal-label">Group name</div>
    <input class="modal-input" id="groupNameInput" type="text" maxlength="32" placeholder="e.g. Weekend Plans 🎉">
    <div class="modal-label">Add members</div>
    <div class="member-checkboxes" id="memberCheckboxes"></div>
    <div class="modal-err" id="groupErr"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeGroupModal()">Cancel</button>
      <button class="modal-btn primary" onclick="createGroup()">Create ✨</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ── Firebase ──
const firebaseConfig = {
  apiKey: "AIzaSyCt0ItW1VbdnwfHJpTRUxUk5RAhBkgDsJ8",
  authDomain: "asenchata.firebaseapp.com",
  projectId: "asenchata",
  storageBucket: "asenchata.firebasestorage.app",
  messagingSenderId: "1059766104296",
  appId: "1:1059766104296:web:aa69cca63fc1f901af995d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── State ──
let myUid = null, myName = null;
let activeId = null, activeType = null; // type: 'dm' | 'group'
let activeName = null, activeMembers = [];
let unsubMessages = null, unsubConvs = null;
let allUsers = [];
let currentTab = 'dms';
let typingTimer = null;
let knownMessages = new Set(); // track already-seen msg IDs

// ── Emojis ──
const EMOJIS = ['😀','😂','🥰','😎','🤔','😭','🥳','🎉','🔥','💯','👍','👎','❤️','💔','✨','🌟','😅','🤣','😊','🥺','😍','🤩','🎊','🙌','💪','🤝','👏','🫡','😏','🤓','😴','🫶','💀','🤯','🫠','👀','🌈','🍕','🍔','🎮','🎵','⚡','💎','🚀','🌙','☀️','⭐','🦋','🌺'];
const REACT_EMOJIS = ['👍','❤️','😂','😮','😢','🔥'];

// ── Helpers ──
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function dmId(a,b){ return [a,b].sort().join('__') }
function initial(n){ return (n||'?')[0].toUpperCase() }
function timeStr(ts){
  const d = ts && ts.toDate ? ts.toDate() : new Date();
  return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function dateStr(ts){
  const d = ts && ts.toDate ? ts.toDate() : new Date();
  const today = new Date();
  if(d.toDateString()===today.toDateString()) return 'Today';
  const yest = new Date(today); yest.setDate(yest.getDate()-1);
  if(d.toDateString()===yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function agoStr(ts){
  if(!ts || !ts.toDate) return '';
  const diff = Date.now() - ts.toDate().getTime();
  const m = Math.floor(diff/60000);
  if(m < 1) return 'now';
  if(m < 60) return `${m}m`;
  if(m < 1440) return `${Math.floor(m/60)}h`;
  return `${Math.floor(m/1440)}d`;
}

// ── Remember Me ──
function saveSession(){ localStorage.setItem('ascenchat_name', myName); localStorage.setItem('ascenchat_uid', myUid); }
function clearSession(){ localStorage.removeItem('ascenchat_name'); localStorage.removeItem('ascenchat_uid'); }
function getSaved(){ return { name: localStorage.getItem('ascenchat_name'), uid: localStorage.getItem('ascenchat_uid') }; }

// ── Setup ──
const setupEl  = document.getElementById('setup');
const appEl    = document.getElementById('app');
const nameInput= document.getElementById('nameInput');
const joinBtn  = document.getElementById('joinBtn');
const setupErr = document.getElementById('setupErr');
const rememberMe = document.getElementById('rememberMe');

// Check saved session
(function(){
  const saved = getSaved();
  if(saved.name && saved.uid){
    nameInput.value = saved.name;
    setupErr.textContent = 'Resuming session…';
    setupErr.style.color = 'var(--ink3)';
    doJoin(saved.uid);
  }
})();

joinBtn.addEventListener('click', ()=>doJoin());
nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doJoin(); });

async function doJoin(savedUid){
  const name = nameInput.value.trim();
  if(!name){ setupErr.textContent='Please enter a display name.'; setupErr.style.color='var(--red)'; return; }
  if(!/^[a-zA-Z0-9_.\- ]+$/.test(name)){ setupErr.textContent='Letters, numbers, _ . - only.'; setupErr.style.color='var(--red)'; return; }
  setupErr.style.color='var(--ink3)';
  joinBtn.disabled=true;
  joinBtn.textContent='Connecting…';
  try {
    let cred;
    if(savedUid){
      // sign in with existing uid if possible
      try{ cred = await auth.signInAnonymously(); } catch(e){ cred = await auth.signInAnonymously(); }
    } else {
      cred = await auth.signInAnonymously();
    }
    myUid  = cred.user.uid;
    myName = name;
    // check name uniqueness
    const snap = await db.collection('users').where('name','==',name).get();
    const taken = snap.docs.some(d => d.id !== myUid);
    if(taken){ setupErr.textContent='That name is taken.'; setupErr.style.color='var(--red)'; joinBtn.disabled=false; joinBtn.textContent='✨ Enter AscentChat'; return; }
    await db.collection('users').doc(myUid).set({ name, uid:myUid, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge:true });
    if(rememberMe.checked) saveSession(); else clearSession();
    document.getElementById('myNameDisplay').textContent = name;
    document.getElementById('myAvatar').textContent = initial(name);
    setupEl.style.display='none';
    appEl.classList.add('live');
    startApp();
  } catch(e){
    console.error(e);
    setupErr.textContent='Connection error. Try again.'; setupErr.style.color='var(--red)';
    joinBtn.disabled=false; joinBtn.textContent='✨ Enter AscentChat';
  }
}

// ── App Init ──
function startApp(){
  updateLastSeen();
  setInterval(updateLastSeen, 30000);
  listenUsers();
}
function updateLastSeen(){
  if(!myUid) return;
  db.collection('users').doc(myUid).update({ lastSeen: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
}

// ── Tab ──
function switchTab(tab){
  currentTab = tab;
  document.getElementById('tabDMs').classList.toggle('active', tab==='dms');
  document.getElementById('tabGroups').classList.toggle('active', tab==='groups');
  document.getElementById('newGroupSideBtn').style.display = tab==='groups' ? 'block' : 'none';
  renderConvList();
}

// ── Users ──
function listenUsers(){
  db.collection('users').onSnapshot(snap => {
    allUsers = [];
    snap.forEach(doc => {
      const d = doc.data();
      if(d.uid !== myUid) allUsers.push(d);
    });
    allUsers.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    renderConvList();
  });
}

document.getElementById('userSearch').addEventListener('input', renderConvList);

function renderConvList(){
  const q = document.getElementById('userSearch').value.trim().toLowerCase();
  const list = document.getElementById('convList');
  if(currentTab === 'dms'){
    let users = q ? allUsers.filter(u=>(u.name||'').toLowerCase().includes(q)) : allUsers;
    if(!users.length){ list.innerHTML=`<div class="conv-empty">${q?'No users found.':'No other users yet.'}</div>`; return; }
    list.innerHTML='';
    users.forEach(u=>{
      const el = document.createElement('div');
      el.className='conv-item'+(activeId===dmId(myUid,u.uid)&&activeType==='dm'?' active':'');
      const isOnline = u.lastSeen && (Date.now()-u.lastSeen.toDate().getTime() < 90000);
      el.innerHTML=`
        <div class="conv-av">${initial(u.name)}${isOnline?'<div class="online-dot"></div>':''}</div>
        <div class="conv-info">
          <div class="conv-name">${esc(u.name)}</div>
          <div class="conv-preview">Click to chat</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time">${agoStr(u.lastSeen)}</div>
        </div>`;
      el.onclick=()=>openDM(u.uid,u.name);
      list.appendChild(el);
    });
  } else {
    // Groups
    db.collection('groups').where('members','array-contains',myUid).orderBy('updatedAt','desc').get()
      .then(snap=>{
        let groups = snap.docs.map(d=>({id:d.id,...d.data()}));
        if(q) groups = groups.filter(g=>(g.name||'').toLowerCase().includes(q));
        if(!groups.length){ list.innerHTML='<div class="conv-empty">No groups yet.<br>Create one! 🎉</div>'; return; }
        list.innerHTML='';
        groups.forEach(g=>{
          const el=document.createElement('div');
          el.className='conv-item'+(activeId===g.id&&activeType==='group'?' active':'');
          el.innerHTML=`
            <div class="conv-av">👥</div>
            <div class="conv-info">
              <div class="conv-name">${esc(g.name)}</div>
              <div class="conv-preview">${g.members.length} members</div>
            </div>
            <div class="conv-meta">
              <div class="conv-time">${agoStr(g.updatedAt)}</div>
            </div>`;
          el.onclick=()=>openGroup(g.id,g.name,g.members);
          list.appendChild(el);
        });
      }).catch(()=>{ list.innerHTML='<div class="conv-empty">No groups yet. Create one! 🎉</div>'; });
  }
}

// ── Open DM ──
function openDM(uid, name){
  activeType='dm'; activeId=dmId(myUid,uid); activeName=name; activeMembers=[];
  openChat(initial(name), name, `Direct message · ${uid.slice(0,8)}…`);
}

// ── Open Group ──
function openGroup(id, name, members){
  activeType='group'; activeId=id; activeName=name; activeMembers=members;
  const memNames = members.filter(m=>m!==myUid).map(uid=>{ const u=allUsers.find(x=>x.uid===uid); return u?u.name:uid.slice(0,6); });
  openChat('👥', name, `${members.length} members · ${memNames.slice(0,3).join(', ')}${memNames.length>3?'…':''}`);
}

function openChat(av, name, sub){
  document.getElementById('chatPlaceholder').style.display='none';
  document.getElementById('chatActive').style.display='flex';
  document.getElementById('chatAv').textContent=av;
  document.getElementById('chatName').textContent=name;
  document.getElementById('chatSub').textContent=sub;
  document.getElementById('messages').innerHTML='<div class="conv-empty"><div class="spin"></div></div>';
  document.getElementById('chatInput').focus();
  renderConvList();
  if(unsubMessages) unsubMessages();
  const ref = activeType==='dm'
    ? db.collection('conversations').doc(activeId).collection('messages')
    : db.collection('groups').doc(activeId).collection('messages');
  unsubMessages = ref.orderBy('timestamp','asc').onSnapshot(snap=>{
    const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
    // check for new pings (messages from others we haven't seen)
    snap.docChanges().forEach(change=>{
      if(change.type==='added'){
        const m = change.doc.data();
        const mid = change.doc.id;
        if(m.from!==myUid && !knownMessages.has(mid) && knownMessages.size>0){
          const senderName = m.fromName || 'Someone';
          showPing(senderName, m.text, ()=>{ /* already open */ });
        }
        knownMessages.add(mid);
      }
    });
    renderMessages(msgs);
  });
}

// ── Messages ──
function renderMessages(msgs){
  const el = document.getElementById('messages');
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
  if(!msgs.length){ el.innerHTML='<div class="conv-empty" style="margin-top:40px">No messages yet 👋<br>Break the ice!</div>'; return; }
  el.innerHTML='';
  let lastDate='', lastFrom='';
  msgs.forEach((m,i)=>{
    const ds = dateStr(m.timestamp);
    if(ds!==lastDate){ lastDate=ds; const lbl=document.createElement('div'); lbl.className='day-label'; lbl.innerHTML=`<span>${esc(ds)}</span>`; el.appendChild(lbl); }
    if(m.system){ const sb=document.createElement('div'); sb.className='msg-row system'; sb.innerHTML=`<div class="system-bubble">${esc(m.text)}</div>`; el.appendChild(sb); lastFrom=''; return; }
    const mine = m.from===myUid;
    const next = msgs[i+1];
    const showAv = !mine && (lastFrom!==m.from || (next&&next.from!==m.from) || !next);
    const showSender = !mine && activeType==='group' && lastFrom!==m.from;
    lastFrom = m.from;
    const senderName = mine ? myName : (m.fromName || activeName || '?');
    const row = document.createElement('div');
    row.className='msg-row'+(mine?' mine':'');
    const reactions = m.reactions || {};
    const reactionHtml = Object.entries(reactions).map(([emoji,uids])=>`<button class="reaction-btn" onclick="toggleReact('${esc(m.id)}','${esc(emoji)}')">${emoji}<span class="reaction-count">${uids.length}</span></button>`).join('');
    const emojiBarHtml = `<div class="emoji-bar">${REACT_EMOJIS.map(e=>`<span class="emoji-choice" onclick="toggleReact('${esc(m.id)}','${esc(e)}')">${e}</span>`).join('')}</div>`;
    row.innerHTML=`
      <div class="msg-av ${showAv?'':'hidden'}">${initial(senderName)}</div>
      <div class="msg-content">
        ${showSender?`<div class="msg-sender">${esc(senderName)}</div>`:''}
        <div class="bubble-wrap">
          ${emojiBarHtml}
          <div class="bubble">${esc(m.text)}</div>
        </div>
        ${reactionHtml?`<div class="bubble-reactions">${reactionHtml}</div>`:''}
        <div class="msg-time-row"><div class="msg-time">${timeStr(m.timestamp)}</div></div>
      </div>`;
    el.appendChild(row);
  });
  if(atBottom) el.scrollTop=el.scrollHeight;
  updateScrollFab();
}

function scrollToBottom(){ document.getElementById('messages').scrollTop=1e9; updateScrollFab(); }
function handleMsgScroll(){ updateScrollFab(); }
function updateScrollFab(){
  const el=document.getElementById('messages');
  const fab=document.getElementById('scrollFab');
  fab.classList.toggle('visible', el.scrollHeight-el.scrollTop-el.clientHeight > 100);
}

// ── Reactions ──
async function toggleReact(msgId, emoji){
  if(!activeId||!msgId) return;
  const ref = activeType==='dm'
    ? db.collection('conversations').doc(activeId).collection('messages').doc(msgId)
    : db.collection('groups').doc(activeId).collection('messages').doc(msgId);
  const snap = await ref.get();
  if(!snap.exists) return;
  const reactions = snap.data().reactions || {};
  const uids = reactions[emoji] || [];
  const idx = uids.indexOf(myUid);
  if(idx>=0) uids.splice(idx,1); else uids.push(myUid);
  if(uids.length===0) delete reactions[emoji]; else reactions[emoji]=uids;
  await ref.update({reactions});
}

// ── Send ──
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
});
document.getElementById('chatInput').addEventListener('input', ()=>{
  const t=document.getElementById('chatInput');
  t.style.height='auto';
  t.style.height=Math.min(t.scrollHeight,130)+'px';
});

async function sendMessage(){
  const text=document.getElementById('chatInput').value.trim();
  if(!text||!activeId) return;
  document.getElementById('chatInput').value='';
  document.getElementById('chatInput').style.height='';
  const payload={from:myUid,fromName:myName,text,timestamp:firebase.firestore.FieldValue.serverTimestamp(),reactions:{}};
  try{
    if(activeType==='dm'){
      await db.collection('conversations').doc(activeId).collection('messages').add(payload);
    } else {
      await db.collection('groups').doc(activeId).collection('messages').add(payload);
      await db.collection('groups').doc(activeId).update({updatedAt:firebase.firestore.FieldValue.serverTimestamp(),lastMsg:text});
    }
  }catch(e){ console.error('Send error',e); }
}

// ── Visual Pings ──
function showPing(from, text, onClick){
  // Flash title
  let orig=document.title, flashing=true;
  const fi=setInterval(()=>{ document.title=flashing?'🔔 New message!':orig; flashing=!flashing; },700);
  setTimeout(()=>{ clearInterval(fi); document.title=orig; },6000);
  // Toast
  const container=document.getElementById('ping-container');
  const toast=document.createElement('div');
  toast.className='ping-toast';
  toast.innerHTML=`<div class="ping-av">${initial(from)}</div><div class="ping-body"><div class="ping-who">${esc(from)}</div><div class="ping-preview">${esc(text.slice(0,60))}</div></div>`;
  toast.onclick=()=>{ dismiss(toast); onClick(); };
  container.appendChild(toast);
  const dismiss=(t)=>{ t.classList.add('out'); setTimeout(()=>t.remove(),300); };
  setTimeout(()=>dismiss(toast),5000);
  // Sound (soft beep via AudioContext)
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator(); const g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type='sine'; osc.frequency.value=880;
    g.gain.setValueAtTime(0,ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.08,ctx.currentTime+0.01);
    g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3);
    osc.start(); osc.stop(ctx.currentTime+0.3);
  }catch(e){}
}

// Listen for global new messages across all convs
function listenGlobalPings(){
  // DM pings: listen for messages addressed to myUid
  db.collectionGroup('messages')
    .where('to','==',myUid)
    .orderBy('timestamp','desc')
    .limit(1)
    .onSnapshot(snap=>{
      snap.docChanges().forEach(change=>{
        if(change.type==='added'){
          const m=change.doc.data();
          const mid=change.doc.id;
          if(!knownMessages.has(mid)){
            knownMessages.add(mid);
            const cid=dmId(myUid,m.from);
            if(activeId!==cid){
              showPing(m.fromName||'Someone',m.text,()=>openDM(m.from,m.fromName||'User'));
            }
          }
        }
      });
    });
}

// ── Emoji Picker ──
function buildEmojiPicker(){
  const p=document.getElementById('emojiPicker');
  const grid=document.createElement('div'); grid.className='emoji-grid';
  EMOJIS.forEach(e=>{ const b=document.createElement('div'); b.className='emoji-pick'; b.textContent=e; b.onclick=()=>insertEmoji(e); grid.appendChild(b); });
  p.appendChild(grid);
}
function toggleEmojiPicker(){ document.getElementById('emojiPicker').classList.toggle('open'); }
function insertEmoji(e){ const t=document.getElementById('chatInput'); t.value+=e; t.focus(); }
document.addEventListener('click',e=>{ if(!e.target.closest('#emojiPicker')&&!e.target.closest('#emojiToggle')) document.getElementById('emojiPicker').classList.remove('open'); });

// ── Group Modal ──
function openGroupModal(e){ e.stopPropagation(); renderMemberCheckboxes(); document.getElementById('groupModal').classList.add('open'); }
function closeGroupModal(){ document.getElementById('groupModal').classList.remove('open'); }
function renderMemberCheckboxes(){
  const c=document.getElementById('memberCheckboxes');
  if(!allUsers.length){ c.innerHTML='<div class="conv-empty">No other users online yet.</div>'; return; }
  c.innerHTML='';
  allUsers.forEach(u=>{
    const label=document.createElement('label');
    label.className='member-check';
    label.innerHTML=`<input type="checkbox" value="${esc(u.uid)}" data-name="${esc(u.name)}"><span class="member-check-name">${esc(u.name)}</span>`;
    c.appendChild(label);
  });
}
async function createGroup(){
  const name=document.getElementById('groupNameInput').value.trim();
  const errEl=document.getElementById('groupErr');
  if(!name){ errEl.textContent='Enter a group name.'; return; }
  const checked=[...document.querySelectorAll('#memberCheckboxes input:checked')];
  if(checked.length<1){ errEl.textContent='Add at least 1 member.'; return; }
  errEl.textContent='';
  const members=[myUid,...checked.map(c=>c.value)];
  try{
    const ref=await db.collection('groups').add({
      name, members,
      createdBy:myUid,
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      lastMsg:''
    });
    await db.collection('groups').doc(ref.id).collection('messages').add({
      system:true, text:`${myName} created this group 🎉`, from:'system', fromName:'System',
      timestamp:firebase.firestore.FieldValue.serverTimestamp(), reactions:{}
    });
    closeGroupModal();
    switchTab('groups');
    openGroup(ref.id, name, members);
  }catch(e){ errEl.textContent='Error creating group.'; console.error(e); }
}

// ── Init emoji picker ──
buildEmojiPicker();

// init ping listener after setup
function startPingListener(){ setTimeout(listenGlobalPings, 2000); }
// patch startApp
const _origStart=startApp;
window.startApp=function(){ _origStart(); startPingListener(); };
</script>
